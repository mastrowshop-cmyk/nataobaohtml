<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --blue: #007aff; --green: #34c759; --gray: #8e8e93; --red: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 90px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); display: flex; padding: 12px; border-top: 1px solid #2c2c2e; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 11px; font-weight: bold; }
        .nav-item.active { color: #fff; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #2c2c2e; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .tab.active { background: var(--blue); }
        .hidden { display: none !important; }
        .status { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="pg-reg" class="page hidden">
        <h1>NaTaoBao</h1>
        <div class="card">
            <input type="text" id="reg-n" placeholder="Имя Фамилия">
            <input type="text" id="reg-c" placeholder="Код (напр. NT01)">
            <button class="btn btn-green" onclick="send({a:'reg', n:v('reg-n'), c:v('reg-c').toUpperCase()})">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="pg-user" class="page hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="u-name">...</h2>
            <b id="u-code" style="color:var(--blue); font-size:20px;">...</b>
        </div>
        <div id="qr-wrap" style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin: 15px 0;"></div>
        <h3>Мои посылки</h3>
        <div id="parcel-list"></div>
    </div>

    <div id="pg-adm" class="page hidden">
        <div class="tabs">
            <div class="tab active" onclick="setTab('a-p')">ГРУЗЫ</div>
            <div class="tab" onclick="setTab('a-s')">НАСТРОЙКИ</div>
        </div>
        <div id="a-p" class="tab-c">
            <div class="card">
                <div id="reader" class="hidden"></div>
                <button class="btn btn-blue" id="scan-btn" onclick="startScan()">📷 СКАНЕР</button>
                <input type="text" id="adm-t" placeholder="Трек-номер">
                <input type="text" id="adm-c" placeholder="Код клиента">
                <input type="number" id="adm-w" step="0.1" placeholder="Вес (кг)">
                <div style="display:flex; gap:8px;">
                    <button class="btn btn-green" onclick="send({a:'add', t:v('adm-t'), c:v('adm-c')})" style="flex:1">В ПУТЬ</button>
                    <button class="btn btn-blue" onclick="send({a:'weight', t:v('adm-t'), w:v('adm-w')})" style="flex:1">ГОТОВ</button>
                </div>
            </div>
            <div id="adm-list"></div>
        </div>
        <div id="a-s" class="tab-c hidden">
            <div class="card">
                <h3>Настройки системы</h3>
                <label style="font-size:12px; color:var(--gray)">Цена за 1 кг (₽):</label>
                <input type="number" id="set-pr" placeholder="500">
                <label style="font-size:12px; color:var(--gray)">Токен ЮKassa:</label>
                <input type="text" id="set-yk" placeholder="123456:TEST:...">
                <button class="btn btn-green" onclick="send({a:'save_s', p:v('set-pr'), yk:v('set-yk')})">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <div class="nav" id="main-nav">
        <div class="nav-item active" onclick="show('user')">ГРУЗЫ</div>
        <div id="adm-btn" class="nav-item hidden" onclick="show('adm')">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(location.search);
        const v = (id) => document.getElementById(id).value;
        const send = (d) => { tg.sendData(JSON.stringify(d)); tg.close(); };

        function show(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('pg-'+p).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(p==='user') document.querySelectorAll('.nav-item')[0].classList.add('active');
            else document.getElementById('adm-btn').classList.add('active');
        }

        function setTab(id) {
            document.querySelectorAll('.tab-c').forEach(x => x.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        const name = params.get('n'), code = params.get('c'), role = params.get('r');
        const price_kg = parseFloat(params.get('pr')) || 0;

        if(!name || name === 'None') show('reg');
        else {
            show('user');
            document.getElementById('u-name').innerText = name;
            document.getElementById('u-code').innerText = code;
            new QRCode(document.getElementById("qr-wrap"), { text: code, width: 120, height: 120 });
            if(role === 'Admin') {
                document.getElementById('adm-btn').classList.remove('hidden');
                document.getElementById('set-pr').value = price_kg;
                document.getElementById('set-yk').value = params.get('yk') || "";
            }

            const ps = params.get('p');
            if(ps) {
                let html = "";
                ps.split(';').forEach(i => {
                    const [w, s, d, cc, tr, paid] = i.split('|');
                    if(cc === code || role === 'Admin') {
                        const isReady = s.includes('ГОТОВ');
                        const cost = (parseFloat(w) * price_kg).toFixed(0);
                        const payBtn = (paid === '0' && isReady && role !== 'Admin') ? 
                            `<button class="btn btn-green" onclick="send({a:'pay', t:'${tr}', amount:${cost}})">ОПЛАТИТЬ ${cost}₽</button>` : '';
                        
                        html += `<div class="card">
                            <div class="status" style="color:${isReady?'#34c759':'#007aff'}">${s}</div>
                            <div style="font-weight:bold;">${tr}</div>
                            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--gray); margin-top:5px;">
                                <span>${w}кг | ${d}</span>
                                <b>${paid==='1'?'✅ ОПЛАЧЕНО':'⌛ '+cost+'₽'}</b>
                            </div>
                            ${payBtn}
                        </div>`;
                    }
                });
                document.getElementById('parcel-list').innerHTML = html || "Грузов нет";
                document.getElementById('adm-list').innerHTML = html;
            }
        }

        let scanner;
        function startScan() {
            document.getElementById('reader').classList.remove('hidden');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('adm-t').value = txt;
                scanner.stop();
                document.getElementById('reader').classList.add('hidden');
            });
        }
    </script>
</body>
</html>
