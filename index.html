<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nataobao Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #ff4d4d; --accent: #007bff; --bg: #0f0f12; --card: #1c1c21; --text: #ffffff; --gray: #a1a1aa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        h1 { text-align: center; color: var(--primary); font-size: 24px; margin: 10px 0; }
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid #2d2d35; }
        .section-title { font-size: 14px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        input, select { width: 100%; background: #26262e; border: 1px solid #3f3f46; color: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #3f3f46; color: white; }
        .btn-save { background: #28a745; color: white; }

        .parcel-item { background: #26262e; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--primary); }
        .hidden { display: none; }
        .role-badge { background: #2d2d35; color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 11px; float: right; }
    </style>
</head>
<body>
    <span id="role-text" class="role-badge">Client</span>
    <h1>Nataobao</h1>

    <div id="reg-section" class="card hidden">
        <span class="section-title">Авторизация</span>
        <input type="text" id="reg_name" placeholder="Имя">
        <input type="text" id="reg_code" placeholder="Код (например A101)">
        <button class="btn btn-primary" onclick="sendData('register')">Создать профиль</button>
    </div>

    <div id="client-section" class="card hidden">
        <span class="section-title">Мои посылки</span>
        <div id="parcel-container">
            <div class="parcel-item">Обновление данных...</div>
        </div>
    </div>

    <div id="admin-section" class="card hidden">
        <span class="section-title">Управление складом</span>
        <input type="text" id="adm_code" placeholder="Код клиента">
        <input type="number" id="adm_weight" step="0.01" placeholder="Вес (кг)">
        <select id="adm_status">
            <option value="В пути">🚚 В пути</option>
            <option value="На складе">📦 На складе</option>
            <option value="Готов к выдаче">✅ Готов к выдаче</option>
        </select>
        <button class="btn btn-save" onclick="sendData('update_parcel')">Обновить посылку</button>

        <span class="section-title" style="margin-top:20px">Настройки сервиса</span>
        <input type="number" id="set_price" placeholder="Цена за кг (570)">
        <input type="text" id="set_addr" placeholder="Адрес выдачи">
        <button class="btn btn-secondary" onclick="sendData('update_settings')">Сохранить конфиг</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'Client';
        const name = params.get('name');
        const code = params.get('code');

        document.getElementById('role-text').innerText = role;

        // ЛОГИКА ОТОБРАЖЕНИЯ
        if (!name || !code) {
            document.getElementById('reg-section').classList.remove('hidden');
        } else {
            document.getElementById('client-section').classList.remove('hidden');
            // Здесь должна быть логика отрисовки списка посылок из БД через бота
        }

        if (role === 'Admin' || role === 'Operator') {
            document.getElementById('admin-section').classList.remove('hidden');
        }

        function sendData(action) {
            let data = { action: action };
            
            if (action === 'register') {
                data.n = document.getElementById('reg_name').value;
                data.c = document.getElementById('reg_code').value;
                if (!data.n || !data.c) return alert("Заполни поля!");
            } 
            else if (action === 'update_parcel') {
                data.c = document.getElementById('adm_code').value;
                data.w = document.getElementById('adm_weight').value;
                data.s = document.getElementById('adm_status').value;
                if (!data.c || !data.w) return alert("Введите код и вес!");
                alert("Данные отправлены боту!");
            }
            else if (action === 'update_settings') {
                data.p = document.getElementById('set_price').value;
                data.a = document.getElementById('set_addr').value;
            }

            // Отправляем данные боту (приложение закроется)
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
