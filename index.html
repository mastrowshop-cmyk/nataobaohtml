<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff3e3e; --bg: #000; --card: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #222; }
        input, select { width: 100%; background: #222; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--red); border: none; color: #fff; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #0a0a0a; padding: 10px 0; border-top: 1px solid #222; }
        .nav-btn { flex: 1; text-align: center; font-size: 10px; color: #666; background: none; border: none; text-transform: uppercase; }
        .nav-btn.active { color: var(--red); font-weight: bold; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 5px; font-size: 10px; background: #333; }
    </style>
</head>
<body>

    <div id="reg-screen" class="hidden">
        <h2 style="text-align:center">РЕГИСТРАЦИЯ</h2>
        <div class="card">
            <input type="text" id="reg-name" placeholder="Ваше Имя">
            <input type="text" id="reg-code" placeholder="Код (например A105)">
            <button class="btn" onclick="saveReg()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="main-screen" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 id="view-name">...</h2>
            <span id="view-role" class="status-badge">Клиент</span>
        </div>
        <p id="view-code" style="color:var(--red); font-weight:bold; margin-top:-10px;"></p>

        <div id="page-profile" class="page">
            <div class="card" style="text-align:center; display:flex; gap:10px;">
                <div style="flex:1; background:#000; padding:10px; border-radius:10px;"><small>ПОСЫЛКИ</small><br><b id="count-p">0</b></div>
                <div style="flex:1; background:#000; padding:10px; border-radius:10px;"><small>К ОПЛАТЕ</small><br><b id="total-s" style="color:#2ecc71">0₽</b></div>
            </div>
            <div id="parcel-list"></div>
        </div>

        <div id="page-admin" class="page hidden">
            <h3 style="color:var(--red)">ДОБАВИТЬ ПОСЫЛКУ</h3>
            <div class="card">
                <input type="text" id="adm-code" placeholder="Код клиента">
                <input type="number" id="adm-weight" placeholder="Вес (кг)">
                <select id="adm-status">
                    <option value="🚚 В ПУТИ">🚚 В ПУТИ</option>
                    <option value="🏁 ГОТОВ К ВЫДАЧЕ">🏁 ГОТОВ</option>
                </select>
                <button class="btn" onclick="addParcel()">ДОБАВИТЬ В БАЗУ</button>
            </div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <button class="nav-btn active" onclick="showPage('profile', this)">Профиль</button>
        <button id="nav-admin-btn" class="nav-btn hidden" onclick="showPage('admin', this)">АДМИН-ПАНЕЛЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        
        const name = urlParams.get('name');
        const role = urlParams.get('role');
        const code = urlParams.get('code');

        if (!name || name === 'None') {
            document.getElementById('reg-screen').classList.remove('hidden');
        } else {
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('view-name').innerText = name;
            document.getElementById('view-code').innerText = "ЛИЧНЫЙ КОД: " + code;

            if (role === 'Admin') {
                document.getElementById('view-role').innerText = "АДМИНИСТРАТОР";
                document.getElementById('view-role').style.color = "yellow";
                document.getElementById('nav-admin-btn').classList.remove('hidden');
            }

            // Рендер посылок
            const pData = urlParams.get('p');
            if(pData) {
                let count = 0, sum = 0;
                pData.split(';').forEach(item => {
                    const [w, s] = item.split('|');
                    count++;
                    if(s.includes("ГОТОВ")) sum += Math.round(w * 570);
                    document.getElementById('parcel-list').innerHTML += `
                        <div class="card" style="border-left: 4px solid var(--red)">
                            <b>${s}</b><br><small>Вес: ${w} кг</small>
                        </div>`;
                });
                document.getElementById('count-p').innerText = count;
                document.getElementById('total-s').innerText = sum + "₽";
            }
        }

        function showPage(page, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-' + page).classList.remove('hidden');
            btn.classList.add('active');
        }

        function saveReg() {
            const n = document.getElementById('reg-name').value;
            const c = document.getElementById('reg-code').value;
            if(!n || !c) return alert("Заполни все поля!");
            tg.sendData(JSON.stringify({action: 'register', n: n, c: c}));
        }

        function addParcel() {
            const c = document.getElementById('adm-code').value;
            const w = document.getElementById('adm-weight').value;
            const s = document.getElementById('adm-status').value;
            if(!c || !w) return alert("Введите данные!");
            tg.sendData(JSON.stringify({action: 'add_parcel', c: c, w: w, s: s}));
        }
    </script>
</body>
</html>
