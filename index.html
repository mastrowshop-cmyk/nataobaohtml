<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salgyn Logistics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; --text: #000000; --gray: #8E8E93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { padding: 20px; display: none; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h1 { font-size: 24px; margin-bottom: 20px; }
        input, select { width: 100%; border: none; background: #F2F2F7; padding: 14px; border-radius: 12px; margin-top: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 600; margin-top: 15px; font-size: 16px; }
        .hidden { display: none; }
        .role-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; background: #E5E5EA; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="loader" class="loader"><div class="spinner"></div><p>Загрузка системы...</p></div>

    <div id="main" class="container">
        <div id="user-role" class="role-badge">Клиент</div>
        <h1 id="greeting">Склад Салгын</h1>

        <div class="card" id="reg-section">
            <h3>Регистрация</h3>
            <input type="text" id="reg_code" placeholder="Ваш личный код">
            <input type="text" id="reg_name" placeholder="Ваше имя">
            <button class="btn" onclick="sendData('register')">Зарегистрироваться</button>
        </div>

        <div class="card hidden" id="operator-section">
            <h3>📦 Управление посылкой</h3>
            <input type="text" id="p_code" placeholder="Код клиента">
            <input type="number" id="p_weight" step="0.01" placeholder="Вес кг">
            <select id="p_status">
                <option value="В пути в Якутск">🚚 В пути</option>
                <option value="На сортировке">📦 На сортировке</option>
                <option value="Прибыл в Якутск">🏠 Прибыл в Якутск</option>
                <option value="Взвешен и готов">✅ Готов к выдаче</option>
            </select>
            <button class="btn" style="background: #34C759;" onclick="sendData('update_parcel')">Обновить статус</button>
        </div>

        <div class="card hidden" id="admin-section">
            <h3>⚙️ Настройки</h3>
            <input type="number" id="set_price" placeholder="Цена за 1 кг (₽)">
            <input type="text" id="set_addr" placeholder="Адрес выдачи">
            <button class="btn" style="background: #FF3B30;" onclick="sendData('settings')">Сохранить настройки</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Твой ID как главного владельца
        const OWNER_ID = 8060718452;

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'block';

            const userId = tg.initDataUnsafe.user.id;

            // Если зашел ТЫ — открываем всё сразу
            if (userId === OWNER_ID) {
                document.getElementById('operator-section').classList.remove('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('user-role').innerText = "Владелец";
            }
            
            // Здесь можно добавить логику: если роль передана от бота через параметры ссылки
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
            if (role === 'Admin' || role === 'Operator') {
                document.getElementById('operator-section').classList.remove('hidden');
                if (role === 'Admin') document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('user-role').innerText = role;
            }
        }, 3000);

        function sendData(action) {
            const data = { action: action };
            if (action === 'register') {
                data.c = document.getElementById('reg_code').value;
                data.n = document.getElementById('reg_name').value;
            } else if (action === 'update_parcel') {
                data.c = document.getElementById('p_code').value;
                data.w = document.getElementById('p_weight').value;
                data.s = document.getElementById('p_status').value;
            } else if (action === 'settings') {
                data.pr = document.getElementById('set_price').value;
                data.ad = document.getElementById('set_addr').value;
            }
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
