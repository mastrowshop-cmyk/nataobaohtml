<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        :root {
            --bg: #000000;
            --card: #121214;
            --accent: #ffffff;
            --red: #ff3b30;
            --blue: #007aff;
            --green: #34c759;
            --gray: #8e8e93;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
            -webkit-user-select: none;
        }

        .hidden { display: none !important; }

        /* Сочный "Жидкий" дизайн */
        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #2c2c2e;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:active { transform: scale(0.97); opacity: 0.9; }

        h2 { font-weight: 900; letter-spacing: -1px; margin: 0 0 15px 0; font-size: 24px; }
        h3 { font-size: 12px; text-transform: uppercase; color: var(--gray); letter-spacing: 1px; margin: 20px 0 10px 5px; }

        input {
            width: 100%;
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            color: #fff;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
        }

        /* Жидкие кнопки */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main { background: var(--accent); color: #000; }
        .btn-pay { background: var(--green); color: #000; box-shadow: 0 8px 20px rgba(52, 199, 89, 0.2); }
        .btn-adm { background: var(--red); color: #fff; }
        .btn-sec { background: var(--blue); color: #fff; }

        /* Навигация */
        .nav {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            display: flex;
            padding: 8px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 22px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray);
            transition: 0.3s;
        }

        .nav-item.active { background: #2c2c2e; color: #fff; }

        /* Статусы */
        .badge {
            font-size: 10px;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 10px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 10px;
        }
        .b-way { background: rgba(0, 122, 255, 0.15); color: var(--blue); }
        .b-ready { background: rgba(52, 199, 89, 0.15); color: var(--green); }

        /* Оплата */
        #modal-pay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <script>
        const tg = window.Telegram.WebApp;
        const v = (id) => document.getElementById(id).value;
        const send = (data) => { tg.sendData(JSON.stringify(data)); tg.close(); };
        
        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }

        function openPay(id, sum) {
            document.getElementById('modal-pay').style.display = 'flex';
            document.getElementById('pay-sum').innerText = sum + ' ₽';
            document.getElementById('pay-id').value = id;
        }
    </script>

    <div id="scr-main">
        <div id="pg-profile" class="page">
            <h2 id="u-n">...</h2>
            <div id="qr-wrap" style="background:#fff; padding:15px; border-radius:20px; display:inline-block; margin-bottom:20px;"></div>
            
            <div class="card" id="p-nt-box" style="border-left: 4px solid var(--green);">Сообщений нет</div>
            
            <h3>Ваши посылки</h3>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h2>Инфо</h2>
            <div class="card" id="all-nt-box" style="color: var(--blue);">Загрузка...</div>
            <div class="card" id="adr-box" style="white-space: pre-wrap;"></div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h2>Управление</h2>
            
            <div class="card">
                <h3>Приемка товара</h3>
                <input type="text" id="a-tr" placeholder="Трек-номер">
                <input type="text" id="a-cc" placeholder="Код клиента">
                <button class="btn btn-main" onclick="send({a:'add', t:v('a-tr'), c:v('a-cc')})">ДОБАВИТЬ В ПУТЬ</button>
            </div>

            <div class="card">
                <h3>Взвешивание</h3>
                <input type="text" id="w-tr" placeholder="Трек-номер">
                <input type="number" id="w-kg" placeholder="Вес (кг)">
                <button class="btn btn-pay" onclick="send({a:'weight', t:v('w-tr'), w:v('w-kg')})">ОБНОВИТЬ ВЕС</button>
            </div>

            <div class="card">
                <h3>Уведомления</h3>
                <input type="text" id="nt-all" placeholder="Общее">
                <button class="btn btn-sec" onclick="send({a:'set_all_nt', v:v('nt-all')})">ВСЕМ</button>
            </div>

            <div id="adm-users"></div>
        </div>
    </div>

    <div id="modal-pay">
        <div class="card" style="width: 90%;">
            <h2 style="text-align:center">Оплата</h2>
            <p style="text-align:center; color:var(--gray)">Сумма к оплате: <b id="pay-sum" style="color:#fff"></b></p>
            <div id="rek-info" style="background:#000; padding:15px; border-radius:15px; font-size:14px; margin:15px 0;"></div>
            <input type="hidden" id="pay-id">
            <button class="btn btn-pay" onclick="send({a:'pay_notify', id:v('pay-id')})">Я ОПЛАТИЛ (ОТПРАВИТЬ ЧЕК)</button>
            <button class="btn" style="margin-top:10px; background:none; color:var(--gray)" onclick="document.getElementById('modal-pay').style.display='none'">ОТМЕНА</button>
        </div>
    </div>

    <div id="navbar" class="nav">
        <div class="nav-item active" onclick="showPage('profile', this)">Грузы</div>
        <div class="nav-item" onclick="showPage('info', this)">Инфо</div>
        <div id="nav-adm" class="nav-item hidden" onclick="showPage('admin', this)">Админ</div>
    </div>

    <script>
        const url = new URLSearchParams(location.search);
        const code = url.get('c'), role = url.get('r'), pr = url.get('pr') || 570;

        document.getElementById('u-n').innerText = url.get('n') + ' (' + code + ')';
        new QRCode(document.getElementById("qr-wrap"), { text: code, width: 140, height: 140, colorDark: "#000", colorLight: "#fff" });
        
        if(url.get('p_nt')) document.getElementById('p-nt-box').innerText = url.get('p_nt');
        document.getElementById('all-nt-box').innerText = url.get('nt') || 'Нет новостей';
        document.getElementById('adr-box').innerText = url.get('adr') + '\n\n' + url.get('rek');
        document.getElementById('rek-info').innerText = url.get('rek');

        if(role === 'Admin') document.getElementById('nav-adm').classList.remove('hidden');

        // Список посылок
        const pStr = url.get('p');
        if(pStr) {
            let h = "";
            pStr.split(';').forEach(p => {
                const [w, s, d, cc, id, tr, paid] = p.split('|');
                if(cc === code || role === 'Admin') {
                    const isPaid = paid === '1';
                    h += `<div class="card">
                        <div class="badge ${s.includes('ГОТОВ')?'b-ready':'b-way'}">${s}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <div><small style="color:var(--gray)">${tr}</small><br><b style="font-size:20px">${w} кг</b></div>
                            <div style="text-align:right">
                                <span style="color:${isPaid? 'var(--green)':'var(--red)'}">${isPaid?'ОПЛАЧЕНО':'ЖДЕТ ОПЛАТЫ'}</span><br>
                                ${(!isPaid && w > 0) ? `<button class="btn-pay" style="padding:8px 15px; border-radius:12px; border:none; margin-top:5px;" onclick="openPay('${id}', '${w*pr}')">ОПЛАТИТЬ</button>` : ''}
                                ${role === 'Admin' ? `<div style="color:var(--red); margin-top:10px; font-size:12px" onclick="send({a:'del', id:'${id}'})">УДАЛИТЬ</div>` : ''}
                            </div>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('p-list').innerHTML = h;
        }
    </script>
</body>
</html>
