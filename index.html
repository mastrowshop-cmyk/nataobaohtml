<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --bg: #000; --card: #121214; --blue: #007aff; --green: #34c759; --gray: #8e8e93; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        input { width: 100%; background: #1c1c1e; border: 1px solid #2c2c2e; color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-scan { background: rgba(0,122,255,0.15); color: var(--blue); border: 1px dashed var(--blue); margin-bottom: 10px; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,20,0.8); backdrop-filter: blur(15px); display: flex; padding: 12px; border-top: 1px solid #2c2c2e; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 11px; font-weight: 600; }
        .nav-item.active { color: #fff; }
        .hidden { display: none !important; }
        
        /* Стили сканера */
        #scanner-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; }
        #reader { flex: 1; }
        .scan-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 260px; height: 160px; border: 2px solid var(--blue); border-radius: 15px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.5); pointer-events: none; }
    </style>
</head>
<body>
    <div id="pg-reg" class="page hidden">
        <h1 style="font-weight:800;">Регистрация</h1>
        <div class="card">
            <input type="text" id="reg-n" placeholder="Имя Фамилия">
            <input type="text" id="reg-c" placeholder="Ваш Код (например: ERS1)">
            <button class="btn btn-green" onclick="register()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="pg-user" class="page hidden">
        <h2 id="u-info">...</h2>
        <div id="qr-wrap" style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px;"></div>
        <div id="parcel-list"></div>
    </div>

    <div id="pg-admin" class="page hidden">
        <div class="card">
            <h3>📦 ПРИЕМКА / ВЗВЕШИВАНИЕ</h3>
            <button class="btn btn-scan" onclick="startScan()">📷 ОТКРЫТЬ СКАНЕР</button>
            <input type="text" id="adm-t" placeholder="Трек-номер">
            <input type="text" id="adm-c" placeholder="Код клиента (для приемки)">
            <input type="number" id="adm-w" placeholder="Вес кг (для выдачи)">
            <div style="display:flex; gap:8px; margin-top:5px;">
                <button class="btn btn-green" onclick="send({a:'add', t:v('adm-t'), c:v('adm-c')})" style="flex:1;">В ПУТЬ</button>
                <button class="btn btn-blue" onclick="send({a:'weight', t:v('adm-t'), w:v('adm-w')})" style="flex:1;">ГОТОВ</button>
            </div>
        </div>
        <div class="card">
            <h3>⚙️ НАСТРОЙКИ</h3>
            <input type="text" id="s-rek" placeholder="Реквизиты СБП">
            <input type="number" id="s-pr" placeholder="Цена за 1 кг">
            <button class="btn btn-blue" onclick="send({a:'set_sys', r:v('s-rek'), p:v('s-pr')})">СОХРАНИТЬ</button>
        </div>
    </div>

    <div id="scanner-ui" class="hidden">
        <div id="reader"></div>
        <div class="scan-overlay"></div>
        <div style="padding: 20px; background: #000;">
            <button class="btn btn-blue" onclick="stopScan()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div class="nav" id="main-nav">
        <div class="nav-item active" onclick="show('user')">📦 МОИ ГРУЗЫ</div>
        <div id="adm-btn" class="nav-item hidden" onclick="show('admin')">🔑 АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const url = new URLSearchParams(location.search);
        const v = (id) => document.getElementById(id).value;
        const send = (d) => { tg.sendData(JSON.stringify(d)); tg.close(); };

        function show(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('pg-'+p).classList.remove('hidden');
        }

        function register() {
            if(!v('reg-n') || !v('reg-c')) return alert("Заполни поля!");
            send({a:'reg', n:v('reg-n'), c:v('reg-c').toUpperCase()});
        }

        // Логика запуска
        if(url.get('n') === 'None') {
            show('reg');
            document.getElementById('main-nav').classList.add('hidden');
        } else {
            show('user');
            document.getElementById('u-info').innerText = url.get('n') + " (" + url.get('c') + ")";
            new QRCode(document.getElementById("qr-wrap"), { text: url.get('c'), width: 120, height: 120 });
            if(url.get('r') === 'Admin') document.getElementById('adm-btn').classList.remove('hidden');
        }

        // СКАНЕР "ПО КРАСОТЕ"
        let html5QrCode;
        async function startScan() {
            document.getElementById('scanner-ui').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 260, height: 160 } };
            html5QrCode.start({ facingMode: "environment" }, config, (text) => {
                document.getElementById('adm-t').value = text;
                stopScan();
            });
        }
        async function stopScan() {
            if(html5QrCode) {
                await html5QrCode.stop();
                html5QrCode.clear();
            }
            document.getElementById('scanner-ui').classList.add('hidden');
        }

        // Рендер посылок
        const pStr = url.get('p');
        if(pStr) {
            let h = "";
            pStr.split(';').forEach(p => {
                const [w, s, d, cc, id, tr, paid] = p.split('|');
                if(cc === url.get('c') || url.get('r') === 'Admin') {
                    h += `<div class="card">
                        <div style="font-size:11px; color:var(--gray); margin-bottom:4px;">${d} | Код: ${cc}</div>
                        <div style="font-weight:700;">${tr}</div>
                        <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center;">
                            <span style="color:var(--green)">${s}</span>
                            <b>${w} кг</b>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('parcel-list').innerHTML = h;
        }
    </script>
</body>
</html>
