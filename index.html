<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #000; --card: #1c1c1e; --blue: #007aff; --green: #34c759; --gray: #8e8e93; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-scan { background: rgba(0,122,255,0.15); color: var(--blue); border: 1px dashed var(--blue); margin-bottom: 10px; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); display: flex; padding: 12px; border-top: 1px solid #2c2c2e; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 11px; font-weight: 700; }
        .nav-item.active { color: #fff; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #2c2c2e; border-radius: 10px; font-size: 11px; white-space: nowrap; }
        .tab.active { background: var(--blue); color: #fff; }
        .hidden { display: none !important; }
        #scanner-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="pg-reg" class="page hidden">
        <h1 style="font-weight:900;">NaTaoBao</h1>
        <div class="card">
            <input type="text" id="reg-n" placeholder="Имя Фамилия">
            <input type="text" id="reg-c" placeholder="Ваш Код (напр. NT01)">
            <button class="btn btn-green" onclick="reg()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="pg-user" class="page hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="u-name" style="margin:0">...</h2>
            <b id="u-code" style="color:var(--blue); font-size:20px;">...</b>
        </div>
        <div id="qr-wrap" style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px;"></div>
        
        <div class="card" style="border: 1px dashed #444;">
            <div style="font-size:11px; color:var(--gray);">Твоя реферальная ссылка:</div>
            <div id="ref-link" style="font-size:12px; color:var(--blue); margin-top:5px; word-break:break-all;"></div>
        </div>
        <div id="parcel-list"></div>
    </div>

    <div id="pg-admin" class="page hidden">
        <div class="tabs">
            <div class="tab active" onclick="setTab('adm-p')">📦 ГРУЗЫ</div>
            <div class="tab" onclick="setTab('adm-u')">👥 КЛИЕНТЫ</div>
            <div class="tab" onclick="setTab('adm-s')">⚙️ НАСТРОЙКИ</div>
        </div>

        <div id="adm-p" class="tab-content">
            <div class="card">
                <button class="btn btn-scan" onclick="startScan()">📷 СКАНЕР</button>
                <input type="text" id="adm-t" placeholder="Трек-номер">
                <input type="text" id="adm-c" placeholder="Код клиента">
                <input type="number" id="adm-w" placeholder="Вес (кг)">
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-green" onclick="send({a:'add', t:v('adm-t'), c:v('adm-c')})" style="flex:1;">В ПУТЬ</button>
                    <button class="btn btn-blue" onclick="send({a:'weight', t:v('adm-t'), w:v('adm-w')})" style="flex:1;">ГОТОВ</button>
                </div>
            </div>
            <div id="adm-parcel-list"></div>
        </div>

        <div id="adm-u" class="tab-content hidden">
            <div id="clients-list"></div>
        </div>

        <div id="adm-s" class="tab-content hidden">
            <div class="card">
                <input type="text" id="s-rek" placeholder="Реквизиты (СБП)">
                <input type="number" id="s-pr" placeholder="Цена за кг (юани)">
                <button class="btn btn-blue" onclick="send({a:'set_sys', r:v('s-rek'), p:v('s-pr')})">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <div id="scanner-ui" class="hidden">
        <div id="reader" style="flex:1;"></div>
        <button class="btn btn-blue" onclick="stopScan()">ЗАКРЫТЬ</button>
    </div>

    <div class="nav" id="main-nav">
        <div class="nav-item active" onclick="show('user')">ГРУЗЫ</div>
        <div id="adm-nav" class="nav-item hidden" onclick="show('admin')">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(location.search);
        const v = (id) => document.getElementById(id).value;
        const send = (d) => { tg.sendData(JSON.stringify(d)); tg.close(); };

        function show(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('pg-'+p).classList.remove('hidden');
        }

        function setTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
            document.getElementById(t).classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            event.target.classList.add('active');
        }

        function reg() { send({a:'reg', n:v('reg-n'), c:v('reg-c').toUpperCase()}); }

        // Инициализация
        const uName = params.get('n'), uCode = params.get('c'), uRole = params.get('r');
        if(!uName || uName === 'None') { show('reg'); } 
        else {
            show('user');
            document.getElementById('u-name').innerText = uName;
            document.getElementById('u-code').innerText = uCode;
            document.getElementById('ref-link').innerText = "https://t.me/" + params.get('bn') + "?start=" + params.get('tid');
            new QRCode(document.getElementById("qr-wrap"), { text: uCode, width: 120, height: 120 });
            if(uRole === 'Admin') {
                document.getElementById('adm-nav').classList.remove('hidden');
                document.getElementById('s-rek').value = params.get('rek') || "";
                document.getElementById('s-pr').value = params.get('pr') || "";
                
                // Рендер клиентов
                const cStr = params.get('clients');
                if(cStr) {
                    let h = "";
                    cStr.split(';').forEach(c => {
                        const [tid, n, cd, rf] = c.split('|');
                        h += `<div class="card"><b>${n} (${cd})</b><br><small>ID: ${tid} | Реф: ${rf||'нет'}</small></div>`;
                    });
                    document.getElementById('clients-list').innerHTML = h;
                }
            }
        }

        // Рендер грузов
        const pStr = params.get('p');
        if(pStr) {
            let h = "";
            pStr.split(';').forEach(p => {
                const [w, s, d, cc, id, tr, pd] = p.split('|');
                if(cc === uCode || uRole === 'Admin') {
                    h += `<div class="card">
                        <small style="color:var(--blue)">${s}</small>
                        <div style="font-weight:700; margin:5px 0;">${tr}</div>
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>${w} кг | ${cc}</span>
                            <b>${pd === '1' ? '✅ ОПЛАЧЕНО' : '⌛ ОЖИДАЕТ'}</b>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('parcel-list').innerHTML = h;
            if(uRole === 'Admin') document.getElementById('adm-parcel-list').innerHTML = h;
        }

        // Сканер
        let html5QrCode;
        async function startScan() {
            document.getElementById('scanner-ui').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
                document.getElementById('adm-t').value = txt;
                stopScan();
            });
        }
        async function stopScan() { if(html5QrCode) { await html5QrCode.stop(); html5QrCode.clear(); } document.getElementById('scanner-ui').classList.add('hidden'); }
    </script>
</body>
</html>
