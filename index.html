<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff4747; --bg: #0d1117; --card: #1c2128; --border: #30363d; --text: #adbac7; --white: #cdd9e5; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .hidden { display: none !important; }
        h2, h3 { color: var(--white); margin: 0; }

        /* Аватарка */
        .u-flex { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .u-avatar { width: 45px; height: 45px; background: var(--red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; text-transform: uppercase; box-shadow: 0 0 15px rgba(255, 71, 71, 0.2); }

        /* Уведомление от администрации */
        .admin-note { background: rgba(255, 166, 0, 0.1); border: 1px solid orange; color: orange; padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; line-height: 1.4; }

        /* Карточки грузов */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; position: relative; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .status-ready { background: #1a3d26; color: #37ff73; }
        .status-way { background: #1a273d; color: #4099ff; }

        .price-tag { color: #37ff73; font-weight: bold; font-size: 14px; margin-top: 4px; }
        .weight-tag { font-size: 18px; color: var(--white); font-weight: bold; }
        
        /* Кнопки и формы */
        .btn { width: 100%; padding: 14px; background: var(--red); border: none; color: #fff; font-weight: 700; border-radius: 12px; cursor: pointer; font-size: 15px; }
        .btn:active { transform: scale(0.98); }
        input, select { width: 100%; background: #22272e; border: 1px solid var(--border); color: #adbac7; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #1c2128; border-top: 1px solid var(--border); padding: 10px 0 25px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #768390; font-weight: bold; text-transform: uppercase; }
        .nav-item.active { color: var(--red); }
        
        .client-list { font-size: 13px; color: #adbac7; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <div style="text-align: center; margin-top: 50px; margin-bottom: 30px;">
            <h1 style="color: var(--red); margin: 0;">NATAOBAO</h1>
            <p style="font-size: 12px; opacity: 0.6;">LOGISTICS TERMINAL</p>
        </div>
        <div class="card">
            <h3 style="text-align:center; margin-bottom: 15px;">Регистрация</h3>
            <input type="text" id="r-n" placeholder="Ваше Имя">
            <input type="text" id="r-c" placeholder="Ваш Код (например A105)">
            <button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">СОЗДАТЬ ПРОФИЛЬ</button>
        </div>
    </div>

    <div id="scr-main" class="hidden">
        
        <div id="admin-notif" class="admin-note hidden">
            <span style="font-size: 18px;">⚠️</span> <span id="admin-notif-text"></span>
        </div>

        <div id="pg-profile" class="page">
            <div class="u-flex">
                <div class="u-avatar" id="u-ava">?</div>
                <div style="flex:1">
                    <div id="u-n" style="font-weight:bold; color:white; font-size:18px">...</div>
                    <div id="u-c-top" style="font-size:12px; color:var(--red); font-weight:bold">ID: ---</div>
                </div>
                <button onclick="tg.close()" style="background:#22272e; border:1px solid var(--border); color:white; padding:8px; border-radius:10px">🔄</button>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h3 style="margin-bottom: 10px;">📍 АДРЕС СКЛАДА</h3>
            <div class="card" id="view-adr">Загрузка...</div>
            <h3 style="margin-bottom: 10px;">💳 ОПЛАТА И ТАРИФ</h3>
            <div class="card">
                <div id="view-rek">Загрузка...</div>
                <hr style="border:0; border-top:1px solid #333; margin: 15px 0;">
                <div style="color:#37ff73; font-weight: bold;">💰 Текущий тариф: 570₽ / кг</div>
            </div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h3>⚙️ ДОБАВИТЬ ГРУЗ</h3>
            <div class="card">
                <input type="text" id="a-c" placeholder="Код клиента (например A105)">
                <input type="number" id="a-w" step="0.1" placeholder="Вес (кг)">
                <select id="a-s"><option value="🚚 В ПУТИ">🚚 В ПУТИ</option><option value="🏁 ГОТОВ">🏁 ГОТОВ</option></select>
                <button class="btn" onclick="addP()">ДОБАВИТЬ В БАЗУ</button>
            </div>

            <h3>📢 ОБЪЯВЛЕНИЕ</h3>
            <div class="card">
                <input type="text" id="ed-notif" placeholder="Текст для всех клиентов">
                <button class="btn" style="background:#cc7a00;" onclick="setS('notif', v('ed-notif'))">ОПУБЛИКОВАТЬ</button>
            </div>

            <h3>📝 НАСТРОЙКИ</h3>
            <div class="card">
                <input type="text" id="ed-adr" placeholder="Адрес склада">
                <button class="btn btn-secondary" style="background:#333; margin-bottom: 10px;" onclick="setS('adr', v('ed-adr'))">ИЗМЕНИТЬ АДРЕС</button>
                <input type="text" id="ed-rek" placeholder="Реквизиты">
                <button class="btn btn-secondary" style="background:#333" onclick="setS('rek', v('ed-rek'))">ИЗМЕНИТЬ РЕКВИЗИТЫ</button>
            </div>

            <h3 style="color: var(--red);">👥 СПИСОК КЛИЕНТОВ</h3>
            <div class="card client-list" id="view-users">Нет данных</div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <div class="nav-item active" onclick="show('profile', this)">ГРУЗЫ</div>
        <div class="nav-item" onclick="show('info', this)">ИНФО</div>
        <div id="nav-adm" class="nav-item hidden" onclick="show('admin', this)">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const url = new URLSearchParams(window.location.search);
        const v = (id) => document.getElementById(id).value;
        const PRICE_PER_KG = 570;

        const name = url.get('n'), role = url.get('r'), code = url.get('c'), globalNotif = url.get('notif');

        // Логика переключения экранов
        if (!name || name === 'None') {
            document.getElementById('scr-auth').classList.remove('hidden');
        } else {
            document.getElementById('scr-main').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            
            document.getElementById('u-n').innerText = name;
            document.getElementById('u-ava').innerText = name.charAt(0);
            document.getElementById('u-c-top').innerText = "ID: " + code;
            
            if(globalNotif && globalNotif !== 'None' && globalNotif !== '') {
                document.getElementById('admin-notif').classList.remove('hidden');
                document.getElementById('admin-notif-text').innerText = globalNotif;
            }

            document.getElementById('view-adr').innerText = url.get('adr') || 'Не задано';
            document.getElementById('view-rek').innerText = url.get('rek') || 'Не задано';
            
            if (role === 'Admin') {
                document.getElementById('nav-adm').classList.remove('hidden');
                const uList = url.get('u_list');
                if(uList) document.getElementById('view-users').innerText = uList.split(';').join('\n');
            }

            // Список посылок
            const parcels = url.get('p');
            const listDiv = document.getElementById('p-list');
            if(parcels && parcels !== "") {
                parcels.split(';').forEach(p => {
                    const [w, s, d, c_code, id] = p.split('|');
                    if(role === 'Admin' || c_code === code) {
                        const cost = Math.round(parseFloat(w) * PRICE_PER_KG);
                        const isReady = s.includes('ГОТОВ');
                        listDiv.innerHTML += `
                            <div class="card">
                                <span style="float:right; font-size:11px; opacity:0.5">${d}</span>
                                <span class="status-badge ${isReady ? 'status-ready' : 'status-way'}">${s}</span>
                                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                                    <div>
                                        <div class="weight-tag">${w} кг</div>
                                        <div class="price-tag">${cost} ₽</div>
                                    </div>
                                    ${role === 'Admin' ? `<div style="text-align:right"><small style="opacity:0.6">${c_code}</small><br><span onclick="send({a:'del', id:${id}})" style="color:var(--red); font-size:11px; font-weight:bold; cursor:pointer">УДАЛИТЬ</span></div>` : ''}
                                </div>
                            </div>`;
                    }
                });
            } else {
                listDiv.innerHTML = '<p style="text-align:center; opacity:0.4; margin-top:40px;">Активных грузов не найдено</p>';
            }
        }

        function show(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }

        function send(data) { tg.sendData(JSON.stringify(data)); tg.close(); }
        function addP() { send({a:'add', c:v('a-c'), w:v('a-w'), s:v('a-s')}); }
        function setS(k, val) { if(val !== undefined) send({a:'set', k:k, v:val}); }
        
        tg.expand();
        tg.setHeaderColor('#0d1117');
    </script>
</body>
</html>
