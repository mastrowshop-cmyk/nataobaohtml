<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --red: #ff3b30; --bg: #0d0d0f; --card-base: rgba(30, 30, 35, 0.5); --border: rgba(255, 255, 255, 0.06); --text: #98989e; --white: #ffffff; --green: #30d158; --neon-blue: #007aff; --neon-purple: #af52de; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 120px; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden; }
        body::before { content: ''; position: fixed; width: 300px; height: 300px; background: var(--neon-blue); border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.1; top: -50px; left: -50px; animation: fly 10s infinite alternate; }
        @keyframes fly { 0% { transform: translate(0,0); } 100% { transform: translate(50px, 50px); } }
        .hidden { display: none !important; }
        .card { background: var(--card-base); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); box-shadow: 0 8px 32px rgba(0,0,0,0.2); animation: fadeIn 0.4s ease; }
        h2 { color: var(--white); font-weight: 800; font-size: 24px; letter-spacing: -0.5px; margin: 0; }
        h3 { color: var(--white); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 10px 5px; opacity: 0.5; }
        .btn { width: 100%; padding: 16px; background: var(--white); border: none; color: black; font-weight: 700; border-radius: 16px; cursor: pointer; font-size: 15px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.96); }
        .btn-admin { background: var(--red); color: white; }
        .btn-outline { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--white); }
        input { width: 100%; background: rgba(28,28,30,0.6); border: 1px solid var(--border); color: var(--white); padding: 16px; border-radius: 14px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .nav { position: fixed; bottom: 25px; left: 25px; right: 25px; height: 68px; background: rgba(28, 28, 30, 0.6); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 700; color: #5c5c61; text-transform: uppercase; }
        .nav-item.active { color: var(--white); }
        .weight-view { font-size: 32px; font-weight: 800; color: var(--white); }
        .status { font-size: 10px; font-weight: 800; padding: 5px 10px; border-radius: 8px; margin-bottom: 10px; display: inline-block; }
        .status-ready { background: rgba(48, 209, 88, 0.15); color: var(--green); }
        .status-way { background: rgba(0, 122, 255, 0.15); color: #007aff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <div style="text-align: center; margin: 80px 0 40px;">
            <h1 style="color: var(--white); font-size: 32px; font-weight: 800; margin:0">NATAOBAO</h1>
            <p style="opacity: 0.4; font-size: 14px;">Logistics & Terminal</p>
        </div>
        <div class="card">
            <input type="text" id="r-n" placeholder="Имя">
            <input type="text" id="r-c" placeholder="Ваш код (A105)">
            <button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">Создать профиль</button>
        </div>
    </div>

    <div id="scr-wait" class="hidden" style="text-align:center; margin-top:150px">
        <h2>ОЖИДАНИЕ</h2>
        <p style="opacity:0.6">Ваш аккаунт проверяется администратором.</p>
    </div>

    <div id="scr-main" class="hidden">
        <div id="pg-profile" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                <div><h2 id="u-n">...</h2><div id="u-c-top" style="color:var(--red); font-weight:800; font-size:14px"></div></div>
                <div style="background:var(--card-base); padding:10px; border-radius:14px; color:white" onclick="location.reload()">🔄</div>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h3>Склад</h3><div class="card" id="view-adr"></div>
            <h3>Оплата</h3><div class="card" id="view-rek"></div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h3>📦 1. ПРИЕМКА ГРУЗА</h3>
            <div class="card" style="border-color: var(--neon-blue)">
                <div style="display:flex; gap:10px; margin-bottom:10px">
                    <input type="text" id="a-c" placeholder="Код клиента (A105)" style="margin:0">
                    <button class="btn btn-outline" style="width:60px" onclick="scanBarcode('a-c')">📷</button>
                </div>
                <div style="font-size:11px; color:var(--neon-blue); margin-bottom:15px; font-weight:bold">Статус: 🚚 ЕДЕТ В ЯКУТСК (авто)</div>
                <button class="btn btn-admin" onclick="send({a:'add_cargo', c:v('a-c')})">ЗАРЕГИСТРИРОВАТЬ ТРЕК</button>
            </div>

            <h3>⚖️ 2. ВЗВЕШИВАНИЕ</h3>
            <div class="card" style="border-color: var(--green)">
                <div style="display:flex; gap:10px; margin-bottom:10px">
                    <input type="text" id="w-c" placeholder="Код клиента" style="margin:0">
                    <button class="btn btn-outline" style="width:60px" onclick="scanBarcode('w-c')">📷</button>
                </div>
                <input type="number" id="w-val" placeholder="Введите вес (кг)">
                <div id="live-price" style="font-size:12px; color:var(--green); margin: 5px 0 15px 5px; font-weight:bold">Итого: 0 ₽</div>
                <button class="btn" style="background:var(--green); color:black" onclick="send({a:'weight_cargo', c:v('w-c'), w:v('w-val')})">ПОДТВЕРДИТЬ ВЕС</button>
            </div>

            <h3>👥 КЛИЕНТЫ И ЗАЯВКИ</h3>
            <div id="user-requests"></div>
            <div class="card" id="all-users-list" style="font-size:13px"></div>

            <h3>⚙️ НАСТРОЙКИ</h3>
            <div class="card">
                <input type="text" id="ed-notif" placeholder="Общее объявление">
                <button class="btn btn-outline" onclick="send({a:'set', k:'notif', v:v('ed-notif')})">Обновить текст</button>
            </div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <div class="nav-item active" onclick="show('profile', this)">Грузы</div>
        <div class="nav-item" onclick="show('info', this)">Инфо</div>
        <div id="nav-adm" class="nav-item hidden" onclick="show('admin', this)">Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const url = new URLSearchParams(window.location.search);
        const v = (id) => document.getElementById(id).value;
        const n = url.get('n'), r = url.get('r'), code = url.get('c'), app = url.get('app');

        // Живой расчет цены при вводе веса
        document.getElementById('w-val').addEventListener('input', function(e) {
            const price = Math.round(e.target.value * 570);
            document.getElementById('live-price').innerText = `Итого: ${price} ₽`;
        });

        function scanBarcode(targetId) {
            tg.showScanQrPopup({ text: "Сканируйте трек-код" }, function(text) {
                document.getElementById(targetId).value = text;
                tg.closeScanQrPopup();
                return true;
            });
        }

        if (!n || n === 'None') {
            document.getElementById('scr-auth').classList.remove('hidden');
        } else if (app === '0' && r !== 'Admin') {
            document.getElementById('scr-wait').classList.remove('hidden');
        } else {
            document.getElementById('scr-main').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('u-n').innerText = n; document.getElementById('u-c-top').innerText = code;
            document.getElementById('view-adr').innerText = url.get('adr') || '—';
            document.getElementById('view-rek').innerText = url.get('rek') || '—';

            if (r === 'Admin') {
                document.getElementById('nav-adm').classList.remove('hidden');
                const uData = url.get('u_list');
                if(uData) {
                    let allStr = "";
                    uData.split(';').forEach(u => {
                        const [un, uc, ua, ut] = u.split('|');
                        allStr += `<div style="padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05)">${ua==='1'?'✅':'⏳'} ${un} (<b>${uc}</b>)</div>`;
                        if(ua === '0') {
                            document.getElementById('user-requests').innerHTML += `
                            <div class="card" style="border-color:var(--red)">
                                <b>${un} (${uc})</b><br><br>
                                <button class="btn btn-admin" style="padding:10px" onclick="send({a:'app_user', tid:${ut}})">ОДОБРИТЬ</button>
                            </div>`;
                        }
                    });
                    document.getElementById('all-users-list').innerHTML = allStr;
                }
            }

            const parcels = url.get('p');
            if(parcels) {
                parcels.split(';').forEach(p => {
                    const [w, s, d, c_code, id, cnt] = p.split('|');
                    if(r === 'Admin' || c_code === code) {
                        const isReady = s.includes('ГОТОВ');
                        document.getElementById('p-list').innerHTML += `
                            <div class="card">
                                <div class="status ${isReady ? 'status-ready' : 'status-way'}">${s}</div>
                                <div style="display:flex; justify-content:space-between; align-items:flex-end">
                                    <div><div class="weight-view">${w} кг</div><div style="color:var(--green); font-weight:600">${Math.round(w*570)} ₽</div></div>
                                    <div style="text-align:right; opacity:0.4; font-size:11px">${d}<br>${r==='Admin' ? `<b style="color:red" onclick="send({a:'del', id:${id}})">УДАЛИТЬ</b>` : ''}</div>
                                </div>
                            </div>`;
                    }
                });
            }
        }

        function show(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }
        function send(data) { tg.sendData(JSON.stringify(data)); tg.close(); }
        tg.expand();
        tg.setHeaderColor('#0d0d0f');
    </script>
</body>
</html>
