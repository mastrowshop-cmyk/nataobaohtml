<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main: #ff3e3e; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #30363d; }
        .btn { width: 100%; padding: 15px; background: var(--main); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        input, select { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #161b22; padding: 15px 0; border-top: 1px solid #30363d; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #8b949e; }
        .nav-item.active { color: var(--main); font-weight: bold; }
        .label { font-size: 10px; color: #8b949e; text-transform: uppercase; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <h2 style="text-align:center">CARGO HUB</h2>
        <div class="card">
            <input type="text" id="r-n" placeholder="Ваше Имя">
            <input type="text" id="r-c" placeholder="Ваш Код (A105)">
            <button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">СОЗДАТЬ ПРОФИЛЬ</button>
        </div>
    </div>

    <div id="scr-main" class="hidden">
        
        <div id="pg-profile" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <div><small id="u-role" class="label">CLIENT</small><h2 id="u-name" style="margin:0">...</h2></div>
                <div id="u-code" style="color:var(--main); font-weight:bold; font-size:1.2em">...</div>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <span class="label">📍 Адрес для получения товара</span>
            <div class="card" id="view-adr" style="color:white; font-weight:bold">...</div>
            <span class="label">💳 Реквизиты для оплаты</span>
            <div class="card" id="view-rek" style="color:#00f260">...</div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h3 style="color:var(--main)">🛠 ПАНЕЛЬ УПРАВЛЕНИЯ</h3>
            <div class="card">
                <span class="label">Добавить посылку</span>
                <input type="text" id="a-c" placeholder="Код клиента">
                <input type="number" id="a-w" placeholder="Вес кг">
                <select id="a-s"><option>🚚 В ПУТИ</option><option>🏁 ГОТОВ</option></select>
                <button class="btn" onclick="addP()">ДОБАВИТЬ И ОПОВЕСТИТЬ</button>
            </div>
            <div class="card">
                <span class="label">Изменить данные склада</span>
                <input type="text" id="ed-adr" placeholder="Новый адрес">
                <button class="btn" style="background:#333; margin-bottom:10px" onclick="setS('adr', v('ed-adr'))">ОБНОВИТЬ АДРЕС</button>
                <input type="text" id="ed-rek" placeholder="Новые реквизиты">
                <button class="btn" style="background:#333" onclick="setS('rek', v('ed-rek'))">ОБНОВИТЬ ОПЛАТУ</button>
            </div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <div class="nav-item active" onclick="show('profile', this)">Грузы</div>
        <div class="nav-item" onclick="show('info', this)">Инфо</div>
        <div id="nav-adm" class="nav-item hidden" onclick="show('admin', this)">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // Включаем Pull-to-Refresh для автообновления
        tg.enableClosingConfirmation();

        const url = new URLSearchParams(window.location.search);
        const v = (id) => document.getElementById(id).value;
        const n = url.get('n'), r = url.get('r'), c = url.get('c');

        if (!n || n === 'None') {
            document.getElementById('scr-auth').classList.remove('hidden');
        } else {
            document.getElementById('scr-main').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('u-name').innerText = n;
            document.getElementById('u-code').innerText = c;
            document.getElementById('view-adr').innerText = url.get('adr');
            document.getElementById('view-rek').innerText = url.get('rek');

            if (r === 'Admin') {
                document.getElementById('u-role').innerText = "MANAGER";
                document.getElementById('nav-adm').classList.remove('hidden');
            }

            const parcels = url.get('p');
            if(parcels) {
                parcels.split(';').forEach(p => {
                    const [w, s, d, code, id] = p.split('|');
                    document.getElementById('p-list').innerHTML += `
                        <div class="card" style="border-left: 4px solid ${s.includes('ГОТОВ') ? '#00f260' : '#3498db'}">
                            <b>${s}</b> <small style="float:right">${d}</small><br>
                            <small>Вес: ${w} кг | Клиент: ${code}</small>
                        </div>`;
                });
            }
        }

        function show(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }

        function send(data) { tg.sendData(JSON.stringify(data)); }
        function addP() { send({a:'add', c:v('a-c'), w:v('a-w'), s:v('a-s')}); }
        function setS(key, val) { if(val) send({a:'set', k:key, v:val}); }
    </script>
</body>
</html>
