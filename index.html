<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #000; --card: #1c1c1e; --blue: #007aff; --green: #34c759; --gray: #8e8e93; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 100px; overflow-x: hidden; }
        .card { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .btn-scan { background: rgba(0,122,255,0.1); color: var(--blue); border: 1px dashed var(--blue); margin-bottom: 10px; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,0.95); backdrop-filter: blur(15px); display: flex; padding: 12px; border-top: 1px solid #2c2c2e; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: var(--gray); font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: #fff; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .st-way { background: rgba(0,122,255,0.2); color: var(--blue); }
        .st-ready { background: rgba(52,199,89,0.2); color: var(--green); }
        .hidden { display: none !important; }
        #scanner-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="pg-reg" class="page hidden">
        <h1 style="font-weight:900; font-size: 32px;">NaTaoBao</h1>
        <div class="card">
            <input type="text" id="reg-n" placeholder="Имя Фамилия">
            <input type="text" id="reg-c" placeholder="Ваш Код (напр. NT77)">
            <button class="btn btn-green" onclick="reg()">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="pg-user" class="page hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="u-name" style="margin:0; font-weight:900;">...</h2>
            <b id="u-code" style="color:var(--blue); font-size:22px;">...</b>
        </div>
        <div id="qr-wrap" style="background:#fff; padding:12px; border-radius:20px; display:inline-block; margin-bottom:20px;"></div>
        
        <div class="card" style="border: 1px dashed #444; background: transparent;">
            <div style="font-size:11px; color:var(--gray);">Твоя реферальная ссылка (копируй):</div>
            <div id="ref-link" style="font-size:12px; color:var(--blue); margin-top:5px; word-break:break-all; font-weight:700;"></div>
        </div>

        <div id="parcel-list"></div>
    </div>

    <div id="pg-admin" class="page hidden">
        <div class="card">
            <h3 style="margin-top:0">📦 ПРИЕМКА И ВЕС</h3>
            <button class="btn btn-scan" onclick="startScan()">📷 ОТКРЫТЬ СКАНЕР</button>
            <input type="text" id="adm-t" placeholder="Трек-номер">
            <input type="text" id="adm-c" placeholder="Код клиента">
            <input type="number" id="adm-w" placeholder="Вес (кг)">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-green" onclick="send({a:'add', t:v('adm-t'), c:v('adm-c')})" style="flex:1;">В ПУТЬ</button>
                <button class="btn btn-blue" onclick="send({a:'weight', t:v('adm-t'), w:v('adm-w')})" style="flex:1;">ГОТОВ</button>
            </div>
        </div>
        
        <div class="card">
            <h3>⚙️ НАСТРОЙКИ СИСТЕМЫ</h3>
            <label style="font-size:11px; color:var(--gray);">Реквизиты оплаты:</label>
            <input type="text" id="s-rek" placeholder="СБП / Карта">
            <label style="font-size:11px; color:var(--gray);">Цена за 1 кг (юани):</label>
            <input type="number" id="s-pr" placeholder="Напр. 570">
            <button class="btn btn-blue" onclick="send({a:'set_sys', r:v('s-rek'), p:v('s-pr')})">СОХРАНИТЬ ВСЁ</button>
        </div>
    </div>

    <div id="scanner-ui" class="hidden">
        <div id="reader" style="flex:1;"></div>
        <div style="padding:20px; background:#000;"><button class="btn btn-blue" onclick="stopScan()">ЗАКРЫТЬ СКАНЕР</button></div>
    </div>

    <div class="nav" id="main-nav">
        <div class="nav-item active" onclick="show('user')">МОИ ГРУЗЫ</div>
        <div id="adm-nav" class="nav-item hidden" onclick="show('admin')">АДМИНКА</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(location.search);
        const v = (id) => document.getElementById(id).value;
        const send = (d) => { tg.sendData(JSON.stringify(d)); tg.close(); };

        function show(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('pg-'+p).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(p === 'user') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(p === 'admin') document.getElementById('adm-nav').classList.add('active');
        }

        function reg() {
            const n = v('reg-n'), c = v('reg-c').toUpperCase();
            if(!n || !c) return alert("Заполни поля!");
            send({a:'reg', n:n, c:c});
        }

        // Авто-заполнение
        const uName = params.get('n'), uCode = params.get('c'), uRole = params.get('r');
        if(!uName || uName === 'None') {
            show('reg');
            document.getElementById('main-nav').classList.add('hidden');
        } else {
            show('user');
            document.getElementById('u-name').innerText = uName;
            document.getElementById('u-code').innerText = uCode;
            document.getElementById('ref-link').innerText = "https://t.me/" + params.get('bn') + "?start=" + params.get('tid');
            new QRCode(document.getElementById("qr-wrap"), { text: uCode, width: 140, height: 140 });
            if(uRole === 'Admin') {
                document.getElementById('adm-nav').classList.remove('hidden');
                document.getElementById('s-rek').value = params.get('rek') || "";
                document.getElementById('s-pr').value = params.get('pr') || "";
            }
        }

        // Логика Сканера
        let html5QrCode;
        async function startScan() {
            document.getElementById('scanner-ui').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 280 }, (txt) => {
                document.getElementById('adm-t').value = txt;
                stopScan();
            });
        }
        async function stopScan() { if(html5QrCode) { await html5QrCode.stop(); html5QrCode.clear(); } document.getElementById('scanner-ui').classList.add('hidden'); }

        // Список грузов
        const pStr = params.get('p');
        if(pStr && uName !== 'None') {
            let html = "";
            pStr.split(';').forEach(p => {
                const [w, s, d, cc, id, tr, paid] = p.split('|');
                if(cc === uCode || uRole === 'Admin') {
                    html += `<div class="card">
                        <div class="status-badge ${s.includes('ГОТОВ')?'st-ready':'st-way'}">${s}</div>
                        <div style="font-size:11px; color:var(--gray);">${d} | Код: ${cc}</div>
                        <div style="font-weight:900; font-size:17px; margin:6px 0;">${tr}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <b style="font-size:19px;">${w} КГ</b>
                            <span style="font-size:12px; font-weight:700;">${paid==='1'?'✅ ОПЛАЧЕНО':'⌛ ОЖИДАЕТ'}</span>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('parcel-list').innerHTML = html || '<div class="card" style="text-align:center; color:var(--gray);">Грузов пока нет</div>';
        }
    </script>
</body>
</html>
