<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff3e3e; --bg: #0d1117; --card: #161b22; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #30363d; }
        .btn { width: 100%; padding: 15px; background: var(--red); border: none; color: #fff; font-weight: bold; border-radius: 10px; cursor: pointer; }
        input, select { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #161b22; padding: 15px 0; border-top: 1px solid #30363d; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #8b949e; font-weight: bold; }
        .nav-item.active { color: var(--red); }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <h2 style="text-align:center">NATAOBAO REG</h2>
        <div class="card"><input type="text" id="r-n" placeholder="Имя"><input type="text" id="r-c" placeholder="Код (A105)"><button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">ВОЙТИ</button></div>
    </div>

    <div id="scr-main" class="hidden">
        <div id="pg-profile" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="u-n">...</h2>
                <button onclick="tg.close()" style="background:#333; color:white; border:none; padding:8px; border-radius:8px; font-size:10px;">ОБНОВИТЬ 🔄</button>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h3>📍 АДРЕС</h3><div class="card" id="view-adr"></div>
            <h3>💳 ОПЛАТА</h3><div class="card" id="view-rek"></div>
        </div>

        <div id="pg-admin" class="page hidden">
            <div class="card">
                <input type="text" id="a-c" placeholder="Код клиента">
                <input type="number" id="a-w" step="0.1" placeholder="Вес">
                <select id="a-s"><option>🚚 В ПУТИ</option><option>🏁 ГОТОВ</option></select>
                <button class="btn" onclick="addP()">ДОБАВИТЬ</button>
            </div>
            <div class="card">
                <input type="text" id="ed-adr" placeholder="Адрес склада">
                <button class="btn" style="background:#333; margin-bottom:5px" onclick="setS('adr', v('ed-adr'))">ИЗМЕНИТЬ АДРЕС</button>
                <input type="text" id="ed-rek" placeholder="Реквизиты">
                <button class="btn" style="background:#333" onclick="setS('rek', v('ed-rek'))">ИЗМЕНИТЬ РЕКВИЗИТЫ</button>
            </div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <div class="nav-item active" onclick="show('profile', this)">ГРУЗЫ</div>
        <div class="nav-item" onclick="show('info', this)">ИНФО</div>
        <div id="nav-adm" class="nav-item hidden" onclick="show('admin', this)">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const url = new URLSearchParams(window.location.search);
        const v = (id) => document.getElementById(id).value;
        const n = url.get('n'), r = url.get('r'), c = url.get('c');

        if (!n || n === 'None') {
            document.getElementById('scr-auth').classList.remove('hidden');
        } else {
            document.getElementById('scr-main').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('u-n').innerText = n + " (" + c + ")";
            document.getElementById('view-adr').innerText = url.get('adr');
            document.getElementById('view-rek').innerText = url.get('rek');
            if (r === 'Admin') document.getElementById('nav-adm').classList.remove('hidden');

            const parcels = url.get('p');
            if(parcels) {
                parcels.split(';').forEach(p => {
                    const [w, s, d, code, id] = p.split('|');
                    if(r === 'Admin' || code === c) {
                        document.getElementById('p-list').innerHTML += `
                            <div class="card" style="border-left:4px solid ${s.includes('ГОТОВ') ? '#00ff00':'#0088ff'}">
                                <b>${s}</b> <small style="float:right">${d}</small><br>
                                Вес: ${w} кг ${r === 'Admin' ? '| Код: '+code : ''}
                                ${r === 'Admin' ? `<br><button onclick="send({a:'del', id:${id}})" style="color:red; background:none; border:none; font-size:10px; padding:0">УДАЛИТЬ</button>` : ''}
                            </div>`;
                    }
                });
            }
        }

        function show(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }

        function send(data) { tg.sendData(JSON.stringify(data)); tg.close(); }
        function addP() { send({a:'add', c:v('a-c'), w:v('a-w'), s:v('a-s')}); }
        function setS(k, val) { send({a:'set', k:k, v:val}); }
        tg.expand();
    </script>
</body>
</html>
