<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root { --red: #ff3b30; --bg: #0d0d0f; --card: rgba(30, 30, 35, 0.5); --border: rgba(255, 255, 255, 0.08); --text: #98989e; --white: #ffffff; --green: #30d158; --blue: #007aff; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 120px; -webkit-font-smoothing: antialiased; position: relative; overflow-x: hidden; }
        body::before { content: ''; position: fixed; width: 300px; height: 300px; background: var(--blue); border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.12; top: -50px; left: -50px; animation: liquid 15s infinite alternate ease-in-out; }
        @keyframes liquid { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(60px, 40px) scale(1.2); } }
        
        .hidden { display: none !important; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 15px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease; }
        
        h2 { color: var(--white); font-weight: 800; font-size: 26px; letter-spacing: -0.8px; margin: 0; }
        h3 { color: var(--white); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 12px 5px; opacity: 0.5; font-weight: 800; }
        
        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--white); padding: 16px; border-radius: 14px; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 18px; background: var(--white); border: none; color: black; font-weight: 700; border-radius: 16px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.96); }
        .btn-admin { background: var(--red); color: white; }
        .btn-outline { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--white); padding: 12px; }

        .nav { position: fixed; bottom: 25px; left: 25px; right: 25px; height: 70px; background: rgba(30,30,35,0.7); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 35px; display: flex; align-items: center; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; font-weight: 800; color: #5c5c61; text-transform: uppercase; }
        .nav-item.active { color: var(--white); }

        .status-tag { font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 9px; text-transform: uppercase; }
        .s-way { background: rgba(0, 122, 255, 0.15); color: var(--blue); }
        .s-ready { background: rgba(48, 209, 88, 0.15); color: var(--green); }
        .client-badge { color: var(--white); font-weight: 800; font-size: 11px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <div style="text-align: center; margin: 100px 0 50px;">
            <h1 style="color: var(--white); font-size: 38px; font-weight: 800; margin:0">NATAOBAO</h1>
            <p style="opacity: 0.4; font-size: 14px;">LOGISTICS TERMINAL</p>
        </div>
        <div class="card">
            <input type="text" id="r-n" placeholder="Ваше Имя">
            <input type="text" id="r-c" placeholder="Код клиента (A105)">
            <button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="scr-wait" class="hidden" style="text-align:center; margin-top:180px">
        <h2>ОЖИДАНИЕ ДОСТУПА</h2>
    </div>

    <div id="scr-main" class="hidden">
        
        <div id="pg-profile" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:35px">
                <div><h2 id="u-n">...</h2><div id="u-c-top" style="color:var(--red); font-weight:800; font-size:14px"></div></div>
                <div style="background:var(--card); padding:12px; border-radius:18px; color:white; border: 1px solid var(--border)" onclick="location.reload()">🔄</div>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h3>📍 СКЛАД</h3><div class="card" id="view-adr" style="color:white; font-size:14px"></div>
            <h3>💳 ОПЛАТА</h3><div class="card" id="view-rek" style="color:white; font-size:14px"></div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h3>📦 1. ПРИЕМКА (ШТРИХ-КОД)</h3>
            <div class="card" style="border-color: var(--blue)">
                <div style="display:flex; gap:10px; margin-bottom:12px">
                    <input type="text" id="a-t" placeholder="Трек-номер" style="margin:0">
                    <button class="btn btn-outline" style="width:65px" onclick="scan('a-t')">📷</button>
                </div>
                <input type="text" id="a-c" placeholder="Код клиента">
                <button class="btn btn-admin" onclick="send({a:'add_cargo', t:v('a-t'), c:v('a-c')})">ЗАРЕГИСТРИРОВАТЬ</button>
            </div>

            <h3>⚖️ 2. ВЗВЕШИВАНИЕ</h3>
            <div class="card" style="border-color: var(--green)">
                <div style="display:flex; gap:10px; margin-bottom:12px">
                    <input type="text" id="w-t" placeholder="Трек или Код" style="margin:0">
                    <button class="btn btn-outline" style="width:65px" onclick="scan('w-t')">📷</button>
                </div>
                <input type="number" id="w-v" placeholder="Вес (кг)">
                <div id="live-p" style="color:var(--green); font-weight:800; font-size:13px; margin-bottom:15px">0 ₽</div>
                <button class="btn" style="background:var(--green); color:black" onclick="send({a:'weight_cargo', t:v('w-t'), c:v('w-t'), w:v('w-v')})">СОХРАНИТЬ ВЕС</button>
            </div>

            <h3>👥 КЛИЕНТЫ</h3>
            <div class="card" id="all-users-list" style="font-size:13px"></div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <div class="nav-item active" onclick="show('profile', this)">Грузы</div>
        <div class="nav-item" onclick="show('info', this)">Инфо</div>
        <div id="nav-adm" class="nav-item hidden" onclick="show('admin', this)">Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const url = new URLSearchParams(window.location.search);
        const v = (id) => document.getElementById(id).value;
        const n = url.get('n'), r = url.get('r'), code = url.get('c'), app = url.get('app');

        document.getElementById('w-v').addEventListener('input', (e) => {
            document.getElementById('live-p').innerText = `${Math.round(e.target.value * 570)} ₽`;
        });

        function scan(id) {
            tg.showScanQrPopup({ text: "Сканируйте штрих-код" }, (text) => {
                document.getElementById(id).value = text;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                tg.closeScanQrPopup();
                return true;
            });
        }

        if (!n || n === 'None') {
            document.getElementById('scr-auth').classList.remove('hidden');
        } else if (app === '0' && r !== 'Admin') {
            document.getElementById('scr-wait').classList.remove('hidden');
        } else {
            document.getElementById('scr-main').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('u-n').innerText = n; 
            document.getElementById('u-c-top').innerText = code;
            document.getElementById('view-adr').innerText = url.get('adr') || '—';
            document.getElementById('view-rek').innerText = url.get('rek') || '—';

            if (r === 'Admin') {
                document.getElementById('nav-adm').classList.remove('hidden');
                const uData = url.get('u_list');
                if(uData) {
                    let uH = "";
                    uData.split(';').forEach(u => {
                        const [un, uc, ua, ut] = u.split('|');
                        uH += `<div>${ua==='1'?'✅':'⏳'} ${un} (<b>${uc}</b>)</div>`;
                    });
                    document.getElementById('all-users-list').innerHTML = uH;
                }
            }

            const parcels = url.get('p');
            if(parcels) {
                parcels.split(';').forEach(p => {
                    const [w, s, d, cc, id, tr] = p.split('|');
                    if(r === 'Admin' || cc === code) {
                        const ready = s.includes('ГОТОВ');
                        document.getElementById('p-list').innerHTML += `
                            <div class="card">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                                    <div class="status-tag ${ready ? 's-ready' : 's-way'}">${s}</div>
                                    <div class="client-badge">ID: ${cc}</div>
                                </div>
                                <div style="display:flex; justify-content:space-between; align-items:flex-end">
                                    <div>
                                        <div style="font-size:32px; font-weight:800; color:white">${w} кг</div>
                                        <div style="color:var(--green); font-weight:700">${Math.round(w*570)} ₽</div>
                                    </div>
                                    <div style="text-align:right; font-size:11px; opacity:0.4">
                                        ТРЕК: ${tr}<br>${d}<br>
                                        ${r==='Admin' ? `<b style="color:var(--red)" onclick="send({a:'del', id:${id}})">УДАЛИТЬ</b>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    }
                });
            }
        }

        function show(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }
        function send(data) { tg.sendData(JSON.stringify(data)); tg.close(); }
        tg.expand();
        tg.setHeaderColor('#0d0d0f');
    </script>
</body>
</html>
