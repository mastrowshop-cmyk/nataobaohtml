<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nataobao OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff3e3e; --bg: #000; --card: #111; --gray: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; border-bottom: 1px solid #222; text-align: center; }
        .container { padding: 15px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        /* Профиль в шапке */
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 50px; height: 50px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-btn { color: var(--gray); font-size: 10px; text-transform: uppercase; font-weight: 800; cursor: pointer; }
        .nav-btn.active { color: var(--red); }

        /* Статусы */
        .p-card { border-left: 4px solid #333; padding-left: 15px; margin-bottom: 15px; }
        .st-path { border-color: #f1c40f; }
        .st-ready { border-color: #2ecc71; }

        input, textarea, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-red { background: var(--red); color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--red); margin:0; font-size:22px;">NATAOBAO</h1>
    </div>

    <div class="container">
        <div id="p-profile" class="page">
            <div class="card">
                <div class="user-info">
                    <div class="avatar" id="av">?</div>
                    <div>
                        <div id="u-name" style="font-weight:bold; font-size:18px;">---</div>
                        <div id="u-code" style="color:var(--red); font-size:14px; font-weight:bold;">Код: ---</div>
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; border-top:1px solid #222; padding-top:15px; text-align:center;">
                    <div><span id="c-all" style="display:block; font-size:18px; font-weight:bold;">0</span><small style="color:#555">ЗАКАЗОВ</small></div>
                    <div><span id="c-path" style="display:block; font-size:18px; font-weight:bold;">0</span><small style="color:#555">В ПУТИ</small></div>
                    <div><span id="c-sum" style="display:block; font-size:18px; font-weight:bold;">0₽</span><small style="color:#555">ДОЛГ</small></div>
                </div>
            </div>
        </div>

        <div id="p-orders" class="page hidden">
            <div id="parcel-list">У вас нет активных посылок</div>
        </div>

        <div id="p-admin" class="page hidden">
            <div class="card">
                <span style="color:var(--red); font-size:12px; font-weight:bold; display:block; margin-bottom:10px;">📦 НОВАЯ ПОСЫЛКА</span>
                <input type="text" id="adm_c" placeholder="Код клиента">
                <input type="number" id="adm_w" placeholder="Вес">
                <select id="adm_s">
                    <option value="В ПУТИ В ЯКУТСК">🚚 В ПУТИ</option>
                    <option value="ПРИБЫЛ В ЯКУТСК">🏠 ПРИБЫЛ</option>
                    <option value="ВЫДАН">🏁 ВЫДАН</option>
                </select>
                <button class="btn btn-red" onclick="sendToBot('update_parcel')">ДОБАВИТЬ</button>
            </div>

            <div class="card">
                <span style="color:#2ecc71; font-size:12px; font-weight:bold; display:block; margin-bottom:10px;">📢 РАССЫЛКА ВСЕМ</span>
                <textarea id="msg_t" placeholder="Текст сообщения..."></textarea>
                <input type="text" id="msg_p" placeholder="Ссылка на фото (если нужно)">
                <button class="btn" style="background:#2ecc71; color:#fff" onclick="sendToBot('broadcast')">ОТПРАВИТЬ ВСЕМ</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showP('profile', this)">👤 Профиль</div>
        <div class="nav-btn" onclick="showP('orders', this)">📦 Посылки</div>
        <div id="adm-btn" class="nav-btn hidden" onclick="showP('admin', this)">🛡 Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(window.location.search);
        
        const name = params.get('name') || "Гость";
        const code = params.get('code') || "---";
        const role = params.get('role');
        const price = parseFloat(params.get('price') || 570);
        const pData = params.get('p') || "";

        // Заполнение профиля
        document.getElementById('u-name').innerText = name;
        document.getElementById('u-code').innerText = "Код: " + code;
        document.getElementById('av').innerText = name.charAt(0).toUpperCase();
        if(role === 'Admin') document.getElementById('adm-btn').classList.remove('hidden');

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + id).classList.remove('hidden');
            el.classList.add('active');
        }

        function render() {
            if(!pData) return;
            const list = document.getElementById('parcel-list');
            list.innerHTML = "";
            let countAll = 0, countPath = 0, totalDebt = 0;

            pData.split(';').forEach(item => {
                const [w, s] = item.split('|');
                countAll++;
                let stClass = "", info = "";
                
                if(s.includes("ЯКУТСК")) {
                    stClass = "st-ready";
                    let cost = (parseFloat(w) * price).toFixed(0);
                    info = `Вес: ${w} кг | <b>${cost}₽</b>`;
                    totalDebt += parseInt(cost);
                } else {
                    stClass = "st-path";
                    info = "В пути. Взвешивание в Якутске";
                    countPath++;
                }

                list.innerHTML += `<div class="card p-card ${stClass}">
                    <div style="font-weight:bold; color:var(--red)">${s}</div>
                    <div style="font-size:13px; margin-top:5px;">${info}</div>
                </div>`;
            });
            document.getElementById('c-all').innerText = countAll;
            document.getElementById('c-path').innerText = countPath;
            document.getElementById('c-sum').innerText = totalDebt + "₽";
        }

        function sendToBot(act) {
            let data = { action: act };
            if(act === 'update_parcel') {
                data.c = document.getElementById('adm_c').value;
                data.w = document.getElementById('adm_w').value;
                data.s = document.getElementById('adm_s').value;
            } else if(act === 'broadcast') {
                data.t = document.getElementById('msg_t').value;
                data.p = document.getElementById('msg_p').value;
            }
            tg.sendData(JSON.stringify(data));
        }
        render();
    </script>
</body>
</html>
