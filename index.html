<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff3e3e; --bg: #000; --card: #111; --gray: #888; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 80px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-btn { color: var(--gray); font-size: 11px; font-weight: bold; cursor: pointer; border: none; background: none; }
        .nav-btn.active { color: var(--red); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="auth" class="hidden">
        <h2>РЕГИСТРАЦИЯ</h2>
        <input type="text" id="rn" placeholder="Имя"><input type="text" id="rc" placeholder="Код">
        <button class="btn" style="background:var(--red); color:#fff" onclick="send('register')">Создать</button>
    </div>

    <div id="main">
        <div id="p-profile" class="page">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><b id="un">...</b><button onclick="send('refresh')" style="color:var(--red); background:none; border:none;">🔄</button></div>
            <div class="card">
                <div id="uc" style="color:var(--red); font-weight:bold; margin-bottom:10px;">ID: ---</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; text-align:center;">
                    <div style="background:#000; padding:10px; border-radius:10px;"><span id="ca">0</span><br><small>ПОСЫЛОК</small></div>
                    <div style="background:#000; padding:10px; border-radius:10px;"><span id="cs" style="color:#2ecc71">0₽</span><br><small>ОПЛАТА</small></div>
                </div>
            </div>
            <div id="plist"></div>
        </div>
        <div id="p-news" class="page hidden"><h3>Новости</h3><div id="nlist"></div></div>
        <div id="p-admin" class="page hidden">
            <div class="card">
                <input type="text" id="ac" placeholder="Код клиента"><input type="number" id="aw" placeholder="Вес">
                <select id="as"><option value="В ПУТИ">🚚 В ПУТИ</option><option value="ГОТОВ">🏁 ГОТОВ</option></select>
                <button class="btn" style="background:var(--red); color:#fff" onclick="send('update_parcel')">Добавить</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <button class="nav-btn active" onclick="show('profile', this)">Профиль</button>
        <button class="nav-btn" onclick="show('news', this)">Новости</button>
        <button id="abtn" class="nav-btn hidden" onclick="show('admin', this)">Админ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');

        if (!name || name === "None") {
            document.getElementById('auth').classList.remove('hidden');
            document.getElementById('main').classList.add('hidden');
        } else {
            document.getElementById('un').innerText = name;
            document.getElementById('uc').innerText = "ID: " + params.get('code');
            if (params.get('role') === 'Admin') document.getElementById('abtn').classList.remove('hidden');
            
            // Рендер посылок
            const p = params.get('p');
            if(p) {
                let t=0, c=0;
                p.split(';').forEach(i => {
                    const [w, s] = i.split('|'); c++;
                    let pr = s.includes("ГОТОВ") ? Math.round(w*570) : 0; t+=pr;
                    document.getElementById('plist').innerHTML += `<div style="padding:10px; background:#111; border-radius:10px; margin-top:10px; border-left:4px solid #333"><b>${s}</b><br>Вес: ${w} кг</div>`;
                });
                document.getElementById('ca').innerText = c; document.getElementById('cs').innerText = t+'₽';
            }
        }

        function show(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + id).classList.remove('hidden'); el.classList.add('active');
        }

        function send(action) {
            let d = {action: action};
            if(action === 'register') { d.n = document.getElementById('rn').value; d.c = document.getElementById('rc').value; }
            if(action === 'update_parcel') { d.c = document.getElementById('ac').value; d.w = document.getElementById('aw').value; d.s = document.getElementById('as').value; }
            tg.sendData(JSON.stringify(d));
        }
    </script>
</body>
</html>
