<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nataobao Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff3e3e; --bg: #000; --card: #111; --gray: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; border-bottom: 1px solid #222; text-align: center; }
        .container { padding: 15px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        /* Профиль */
        .user-info { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 50px; height: 50px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; }
        
        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-btn { color: var(--gray); font-size: 10px; text-transform: uppercase; font-weight: 800; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--red); }

        /* Новости */
        .news-card { background: var(--card); border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        .news-img { width: 100%; height: auto; max-height: 300px; object-fit: cover; display: block; }
        .news-body { padding: 15px; }

        input, textarea, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-red { background: var(--red); color: #fff; }
        .hidden { display: none !important; }
        
        #upload-status { font-size: 12px; color: var(--red); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--red); margin:0; font-size:20px;">NATAOBAO TERMINAL</h1>
    </div>

    <div class="container">
        <div id="p-profile" class="page">
            <div class="card">
                <div class="user-info">
                    <div class="avatar" id="av">?</div>
                    <div>
                        <div id="u-name" style="font-weight:bold; font-size:18px;">---</div>
                        <div id="u-code" style="color:var(--red); font-size:14px; font-weight:bold;">Код: ---</div>
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; border-top:1px solid #222; padding-top:15px; text-align:center;">
                    <div><span id="c-all" style="font-size:18px; font-weight:bold; display:block;">0</span><small>ЗАКАЗОВ</small></div>
                    <div><span id="c-sum" style="font-size:18px; font-weight:bold; display:block;">0₽</span><small>К ОПЛАТЕ</small></div>
                </div>
            </div>
        </div>

        <div id="p-news" class="page hidden">
            <div id="news-list">Новостей пока нет.</div>
        </div>

        <div id="p-admin" class="page hidden">
            <div class="card">
                <span style="color:var(--red); font-size:11px; font-weight:800;">ОБНОВЛЕНИЕ СКЛАДА</span>
                <input type="text" id="adm_c" placeholder="Код клиента">
                <input type="number" id="adm_w" placeholder="Вес">
                <select id="adm_s">
                    <option value="В ПУТИ">🚚 В ПУТИ</option>
                    <option value="ПРИБЫЛ В ЯКУТСК">🏠 ПРИБЫЛ</option>
                    <option value="ВЫДАН">🏁 ВЫДАН</option>
                </select>
                <button class="btn btn-red" onclick="sendToBot('update_parcel')">ОБНОВИТЬ</button>
            </div>

            <div class="card">
                <span style="color:#2ecc71; font-size:11px; font-weight:800;">РАССЫЛКА И НОВОСТИ</span>
                <textarea id="msg_t" placeholder="Текст сообщения..."></textarea>
                <span id="upload-status"></span>
                <input type="file" id="file_input" accept="image/*" style="display: none;" onchange="uploadImage(this)">
                <button class="btn" style="background:#333; margin-bottom:10px;" onclick="document.getElementById('file_input').click()">🖼 ВЫБРАТЬ ФОТО</button>
                <input type="hidden" id="msg_p_url">
                <button class="btn" style="background:#2ecc71; color:#fff" onclick="sendToBot('broadcast')">ОТПРАВИТЬ ВСЕМ</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showP('profile', this)">👤 Профиль</div>
        <div class="nav-btn" onclick="showP('news', this)">🔔 Новости</div>
        <div id="adm-btn" class="nav-btn hidden" onclick="showP('admin', this)">🛡 Админ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const params = new URLSearchParams(window.location.search);
        
        // Данные из URL
        const name = params.get('name') || "Гость";
        const code = params.get('code') || "---";
        const role = params.get('role');
        const pData = params.get('p') || "";
        const newsData = params.get('news') || "";

        document.getElementById('u-name').innerText = name;
        document.getElementById('u-code').innerText = "Код: " + code;
        document.getElementById('av').innerText = name.charAt(0).toUpperCase();
        if(role === 'Admin') document.getElementById('adm-btn').classList.remove('hidden');

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + id).classList.remove('hidden');
            el.classList.add('active');
        }

        // Загрузка фото на ImgBB
        async function uploadImage(input) {
            const status = document.getElementById('upload-status');
            if (!input.files[0]) return;
            
            status.innerText = "⏳ Загрузка фото...";
            const formData = new FormData();
            formData.append("image", input.files[0]);

            try {
                // Использую бесплатный ключ (рекомендую потом получить свой на imgbb.com)
                const res = await fetch("https://api.imgbb.com/1/upload?key=6d207e021112421aa6c40683a677e113", {
                    method: "POST",
                    body: formData
                });
                const json = await res.json();
                if(json.success) {
                    document.getElementById('msg_p_url').value = json.data.url;
                    status.innerText = "✅ Фото загружено!";
                }
            } catch (e) {
                status.innerText = "❌ Ошибка загрузки";
            }
        }

        function renderNews() {
            if(!newsData) return;
            const list = document.getElementById('news-list');
            list.innerHTML = "";
            newsData.split(';').forEach(item => {
                const [txt, img] = item.split('|');
                if(!txt) return;
                list.innerHTML += `
                    <div class="news-card">
                        ${img ? `<img src="${img}" class="news-img">` : ""}
                        <div class="news-body"><p style="margin:0; font-size:14px;">${txt}</p></div>
                    </div>`;
            });
        }

        function renderStats() {
            if(!pData) return;
            let count = 0, sum = 0;
            pData.split(';').forEach(i => {
                const [w, s] = i.split('|');
                count++;
                if(s.includes("ЯКУТСК")) sum += parseFloat(w) * 570;
            });
            document.getElementById('c-all').innerText = count;
            document.getElementById('c-sum').innerText = Math.round(sum) + "₽";
        }

        function sendToBot(act) {
            let data = { action: act };
            if(act === 'update_parcel') {
                data.c = document.getElementById('adm_c').value;
                data.w = document.getElementById('adm_w').value;
                data.s = document.getElementById('adm_s').value;
            } else if(act === 'broadcast') {
                data.t = document.getElementById('msg_t').value;
                data.p = document.getElementById('msg_p_url').value;
                if(!data.t) return alert("Введите текст!");
            }
            tg.sendData(JSON.stringify(data));
        }

        renderNews();
        renderStats();
    </script>
</body>
</html>
