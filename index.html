<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nataobao</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #ff4d4d; --bg: #f4f4f9; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #1a1a1a; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; display: none; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 16px; }
        input { width: 100%; border: 1.5px solid #eee; padding: 14px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        .hidden { display: none; }
        .welcome-text { text-align: center; font-weight: bold; margin-bottom: 20px; color: #555; }
    </style>
</head>
<body>
    <div id="main" class="container">
        <h1>Nataobao</h1>
        <div id="welcome-msg" class="welcome-text hidden"></div>

        <div id="reg-section" class="card">
            <h3>🔑 Регистрация</h3>
            <input type="text" id="reg_code" placeholder="Ваш код (A101)">
            <input type="text" id="reg_name" placeholder="Ваше имя">
            <button class="btn" onclick="sendData('register')">Зарегистрироваться</button>
        </div>

        <div id="client-section" class="card hidden">
            <h3>📦 Мои посылки</h3>
            <p>Здесь будут отображаться ваши заказы.</p>
            <button class="btn" style="background:#888" onclick="tg.close()">Закрыть</button>
        </div>

        <div id="admin-section" class="card hidden">
            <h3>⚙️ Админ-панель</h3>
            <input type="text" id="p_code" placeholder="Код клиента">
            <input type="number" id="p_weight" placeholder="Вес">
            <button class="btn" style="background:#28a745" onclick="sendData('update')">Обновить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const OWNER_ID = 8060718452;

        window.onload = () => {
            document.getElementById('main').style.display = 'block';
            
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            const name = params.get('name');
            const code = params.get('code');
            const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;

            // Если есть имя в ссылке — значит юзер зареган
            if (name && code) {
                document.getElementById('reg-section').classList.add('hidden');
                document.getElementById('client-section').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Привет, ${name} (${code})`;
                document.getElementById('welcome-msg').classList.remove('hidden');
            }

            // Показываем админку, если ты владелец
            if (userId === OWNER_ID || role === 'Admin') {
                document.getElementById('admin-section').classList.remove('hidden');
            }
        };

        function sendData(action) {
            let p = { action: action };
            if (action === 'register') {
                p.c = document.getElementById('reg_code').value.trim();
                p.n = document.getElementById('reg_name').value.trim();
                if (!p.c || !p.n) return alert("Заполни поля!");
            }
            tg.sendData(JSON.stringify(p));
        }
    </script>
</body>
</html>
