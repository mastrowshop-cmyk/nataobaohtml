<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nataobao Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; }
        .card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        h1 { color: #ff3e3e; text-align: center; text-transform: uppercase; margin: 0 0 20px; }
        .label { color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-red { background: #ff3e3e; color: #fff; }
        
        .parcel-item { background: #1a1a1a; padding: 15px; border-radius: 12px; border-left: 3px solid #ff3e3e; margin-bottom: 10px; }
        .p-status { font-weight: 900; color: #ff3e3e; display: block; margin-bottom: 5px; }
        .p-info { font-size: 13px; color: #aaa; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Nataobao</h1>

    <div id="reg-form" class="card hidden">
        <span class="label">Новый профиль</span>
        <input type="text" id="name" placeholder="ИМЯ">
        <input type="text" id="code" placeholder="КОД КЛИЕНТА">
        <button class="btn btn-red" onclick="saveReg()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <div id="client-ui" class="card hidden">
        <span class="label">Ваши отправления</span>
        <div id="parcel-list">Заказов не найдено.</div>
    </div>

    <div id="admin-ui" class="card hidden">
        <span class="label" style="color:#ff3e3e">Админ-панель</span>
        <input type="text" id="t_code" placeholder="КОД КЛИЕНТА">
        <input type="number" id="t_weight" placeholder="ВЕС">
        <select id="t_status">
            <option value="В ПУТИ В ЯКУТСК">🚚 В ПУТИ В ЯКУТСК</option>
            <option value="ПРИБЫЛ В ЯКУТСК">🏠 ПРИБЫЛ В ЯКУТСК</option>
            <option value="ВЫДАН">🏁 ВЫДАН</option>
        </select>
        <button class="btn btn-red" onclick="sendAction('update_parcel')">ОБНОВИТЬ СТАТУС</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        const role = params.get('role');
        const uName = params.get('name');
        const uCode = params.get('code');
        const uPrice = parseFloat(params.get('price') || 570);
        const pData = params.get('p'); // вес|статус;вес|статус

        // 1. Показываем нужные блоки
        if (!uName || !uCode) {
            document.getElementById('reg-form').classList.remove('hidden');
        } else {
            document.getElementById('client-ui').classList.remove('hidden');
            renderParcels(pData, uPrice);
        }

        if (role === 'Admin') document.getElementById('admin-ui').classList.remove('hidden');

        // 2. Отрисовка посылок
        function renderParcels(data, price) {
            if (!data) return;
            const container = document.getElementById('parcel-list');
            container.innerHTML = "";
            
            data.split(';').forEach(item => {
                const [weight, status] = item.split('|');
                let info = "";
                
                // Взвешивание и цена только если прибыл
                if (status === "ПРИБЫЛ В ЯКУТСК") {
                    const total = (parseFloat(weight) * price).toFixed(0);
                    info = `⚖️ Вес: ${weight} кг | 💰 К оплате: ${total}₽`;
                } else {
                    info = "⚖️ Ожидает взвешивания по прибытию";
                }

                container.innerHTML += `
                    <div class="parcel-item">
                        <span class="p-status">${status}</span>
                        <span class="p-info">${info}</span>
                    </div>
                `;
            });
        }

        function saveReg() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('code').value;
            tg.sendData(JSON.stringify({action:'register', n:n, c:c}));
        }

        function sendAction(act) {
            const c = document.getElementById('t_code').value;
            const w = document.getElementById('t_weight').value;
            const s = document.getElementById('t_status').value;
            tg.sendData(JSON.stringify({action:act, c:c, w:w, s:s}));
        }
    </script>
</body>
</html>
