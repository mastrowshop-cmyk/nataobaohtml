<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        :root { --accent: #007AFF; --red: #FF3B30; --bg: #010101; --card: rgba(28,28,30,0.7); --border: rgba(255,255,255,0.1); --green: #32D74B; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-bottom: 100px; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Дизайн карточек */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 12px; backdrop-filter: blur(15px); animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-weight: 900; letter-spacing: -1px; margin: 0; }
        h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin: 20px 0 10px 5px; }

        input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .btn { width: 100%; padding: 16px; background: white; color: black; border: none; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        .btn-adm { background: var(--accent); color: white; }
        .btn-del { background: rgba(255,59,48,0.1); color: var(--red); padding: 5px 10px; border-radius: 8px; font-size: 10px; border: 1px solid rgba(255,59,48,0.2); }

        /* Статусы */
        .status { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .s-way { background: rgba(0,122,255,0.15); color: var(--accent); }
        .s-ready { background: rgba(50,215,75,0.15); color: var(--green); }

        /* Навигация */
        .nav { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(25,25,27,0.9); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 25px; display: flex; padding: 6px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 11px; font-weight: 700; color: #8E8E93; border-radius: 20px; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.1); }

        .user-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <div style="text-align:center; margin: 80px 0 40px;"><h2>NATAOBAO</h2><p style="opacity:0.4">Вход в систему</p></div>
        <div class="card">
            <input type="text" id="r-n" placeholder="Имя">
            <input type="text" id="r-c" placeholder="Код клиента (например A105)">
            <button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="scr-wait" class="hidden" style="text-align:center; margin-top:150px">
        <h2 style="color:var(--accent)">⏳ ДОСТУП ОГРАНИЧЕН</h2>
        <p style="opacity:0.5; padding: 0 40px;">Администратор проверяет вашу заявку. Пожалуйста, подождите.</p>
    </div>

    <div id="scr-main" class="hidden">
        
        <div id="pg-profile" class="page">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
                <div><h2 id="u-n">...</h2><div id="u-c-top" style="color:var(--accent); font-weight:900; font-size:14px"></div></div>
                <div style="background:var(--card); padding:12px; border-radius:15px; border:1px solid var(--border)" onclick="location.reload()">🔄</div>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h3>📍 АДРЕС СКЛАДА В КИТАЕ</h3>
            <div class="card" id="view-adr" style="font-size:14px; line-height:1.5"></div>
            <h3>💳 РЕКВИЗИТЫ ДЛЯ ОПЛАТЫ</h3>
            <div class="card" id="view-rek" style="font-size:14px; line-height:1.5"></div>
            <h3>📢 УВЕДОМЛЕНИЯ</h3>
            <div class="card" id="view-notif" style="font-size:13px; color:var(--accent)">Нет новых уведомлений</div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h3>📦 1. ПРИЕМКА (СКЛАД КИТАЙ)</h3>
            <div class="card" style="border-color: var(--accent)">
                <div style="display:flex; gap:8px; margin-bottom:10px">
                    <input type="text" id="a-t" placeholder="Трек-номер" style="margin:0">
                    <button class="btn" style="width:60px; background:var(--border); color:white" onclick="scan('a-t')">📷</button>
                </div>
                <input type="text" id="a-c" placeholder="Код клиента">
                <button class="btn btn-adm" onclick="send({a:'add_cargo', t:v('a-t'), c:v('a-c')})">ЗАРЕГИСТРИРОВАТЬ</button>
            </div>

            <h3>⚖️ 2. ВЗВЕШИВАНИЕ (ЯКУТСК)</h3>
            <div class="card" style="border-color: var(--green)">
                <div style="display:flex; gap:8px; margin-bottom:10px">
                    <input type="text" id="w-t" placeholder="Трек или ID клиента" style="margin:0">
                    <button class="btn" style="width:60px; background:var(--border); color:white" onclick="scan('w-t')">📷</button>
                </div>
                <input type="number" id="w-v" placeholder="Вес (кг)">
                <div id="live-p" style="color:var(--green); font-weight:900; margin: 5px 0 15px 5px">0 ₽</div>
                <button class="btn" style="background:var(--green); color:black" onclick="send({a:'weight_cargo', t:v('w-t'), w:v('w-v')})">
