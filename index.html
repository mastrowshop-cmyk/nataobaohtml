<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #000; --card: #1c1c1e; --blue: #007aff; --green: #34c759; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 18px; padding: 16px; margin-bottom: 12px; border: 1px solid #2c2c2e; }
        .u-header { font-size: 22px; font-weight: 900; margin-bottom: 15px; display: flex; justify-content: space-between; }
        input { width: 100%; background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; padding: 14px; border-radius: 12px; margin-bottom: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--green); color: #000; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-bottom: 8px; }
        .st-way { background: rgba(0,122,255,0.2); color: var(--blue); }
        .st-ready { background: rgba(52,199,89,0.2); color: var(--green); }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,0.9); backdrop-filter: blur(10px); display: flex; padding: 12px; border-top: 1px solid #2c2c2e; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #8e8e93; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: #fff; }
        .hidden { display: none !important; }
        #scanner-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="pg-reg" class="page hidden">
        <h1 style="font-weight:900;">Регистрация</h1>
        <div class="card">
            <input type="text" id="reg-n" placeholder="Имя Фамилия">
            <input type="text" id="reg-c" placeholder="Ваш Код (напр. NT01)">
            <button class="btn btn-green" onclick="reg()">ВОЙТИ</button>
        </div>
    </div>

    <div id="pg-user" class="page hidden">
        <div class="u-header">
            <span id="u-name">...</span>
            <span id="u-code" style="color:var(--blue)">...</span>
        </div>
        <div id="qr-wrap" style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px;"></div>
        
        <div class="card" style="border: 1px dashed #444;">
            <div style="font-size:12px; color:#8e8e93;">Твоя ссылка для приглашения:</div>
            <div id="ref-link" style="font-size:13px; color:var(--blue); font-weight:700; margin-top:5px; word-break: break-all;"></div>
        </div>

        <div id="parcel-list"></div>
    </div>

    <div id="pg-admin" class="page hidden">
        <div class="card">
            <h3>📦 АДМИН-ПАНЕЛЬ</h3>
            <button class="btn btn-blue" onclick="startScan()" style="margin-bottom:10px; background: rgba(0,122,255,0.2);">📷 СКАНЕР</button>
            <input type="text" id="adm-t" placeholder="Трек-номер">
            <input type="text" id="adm-c" placeholder="Код клиента">
            <input type="number" id="adm-w" placeholder="Вес (кг)">
            <div style="display:flex; gap:10px;">
                <button class="btn btn-green" onclick="send({a:'add', t:v('adm-t'), c:v('adm-c')})">В ПУТЬ</button>
                <button class="btn btn-blue" onclick="send({a:'weight', t:v('adm-t'), w:v('adm-w')})">ГОТОВ</button>
            </div>
        </div>
    </div>

    <div id="scanner-ui" class="hidden">
        <div id="reader" style="flex:1;"></div>
        <div style="padding:20px; background:#000;"><button class="btn btn-blue" onclick="stopScan()">ОТМЕНА</button></div>
    </div>

    <div class="nav" id="main-nav">
        <div class="nav-item active" onclick="show('user')">ГРУЗЫ</div>
        <div id="adm-nav" class="nav-item hidden" onclick="show('admin')">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(location.search);
        const v = (id) => document.getElementById(id).value;
        const send = (d) => { tg.sendData(JSON.stringify(d)); tg.close(); };

        function show(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.getElementById('pg-'+p).classList.remove('hidden');
        }

        function reg() {
            const n = v('reg-n'), c = v('reg-c').toUpperCase();
            if(!n || !c) return alert("Заполни поля!");
            send({a:'reg', n:n, c:c});
        }

        const myName = params.get('n'), myCode = params.get('c'), myTid = params.get('tid');
        if(!myName || myName === 'None') {
            show('reg');
            document.getElementById('main-nav').classList.add('hidden');
        } else {
            show('user');
            document.getElementById('u-name').innerText = myName;
            document.getElementById('u-code').innerText = myCode;
            document.getElementById('ref-link').innerText = "https://t.me/" + params.get('bn') + "?start=" + myTid;
            new QRCode(document.getElementById("qr-wrap"), { text: myCode, width: 120, height: 120 });
            if(params.get('r') === 'Admin') document.getElementById('adm-nav').classList.remove('hidden');
        }

        let html5QrCode;
        async function startScan() {
            document.getElementById('scanner-ui').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                document.getElementById('adm-t').value = txt;
                stopScan();
            });
        }
        async function stopScan() { if(html5QrCode) { await html5QrCode.stop(); html5QrCode.clear(); } document.getElementById('scanner-ui').classList.add('hidden'); }

        const pStr = params.get('p');
        if(pStr) {
            let html = "";
            pStr.split(';').forEach(p => {
                const [w, s, d, cc, id, tr, paid] = p.split('|');
                if(cc === myCode || params.get('r') === 'Admin') {
                    html += `<div class="card">
                        <div class="status-badge ${s.includes('ГОТОВ')?'st-ready':'st-way'}">${s}</div>
                        <div style="font-size:12px; color:#8e8e93;">${d} | Код: ${cc}</div>
                        <div style="font-weight:700; font-size:16px; margin: 5px 0;">${tr}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                            <b style="font-size:18px;">${w} кг</b>
                            <span style="font-size:12px;">${paid==='1'?'✅ Оплачено':'⌛ Ждет оплаты'}</span>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('parcel-list').innerHTML = html || '<div class="card">Пока грузов нет</div>';
        }
    </script>
</body>
</html>
