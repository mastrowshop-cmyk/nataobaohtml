<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #ff4747; --bg: #0d1117; --card: #1c2128; --border: #30363d; --text: #adbac7; --white: #cdd9e5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .hidden { display: none !important; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 14px; background: var(--red); border: none; color: #fff; font-weight: 700; border-radius: 12px; cursor: pointer; margin-top: 5px; }
        input, select { width: 100%; background: #22272e; border: 1px solid var(--border); color: #adbac7; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #1c2128; border-top: 1px solid var(--border); padding: 10px 0 25px; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #768390; font-weight: bold; }
        .nav-item.active { color: var(--red); }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .status-ready { background: #1a3d26; color: #37ff73; }
        .status-way { background: #1a273d; color: #4099ff; }
        .personal-note { background: #ff474722; border: 1px solid var(--red); color: var(--red); padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="scr-auth" class="hidden">
        <div class="card" style="margin-top:50px">
            <h2 style="text-align:center; color:var(--red)">NATAOBAO</h2>
            <input type="text" id="r-n" placeholder="Имя">
            <input type="text" id="r-c" placeholder="Код (A105)">
            <button class="btn" onclick="send({a:'reg', n:v('r-n'), c:v('r-c')})">ОТПРАВИТЬ ЗАЯВКУ</button>
        </div>
    </div>

    <div id="scr-wait" class="hidden" style="text-align:center; margin-top:100px">
        <h2 style="color:var(--red)">ДОСТУП ОГРАНИЧЕН</h2>
        <p>Ваш аккаунт ожидает подтверждения администратором.</p>
        <button class="btn" onclick="tg.close()">ЗАКРЫТЬ</button>
    </div>

    <div id="scr-main" class="hidden">
        <div id="p-msg-box" class="personal-note hidden"></div>
        
        <div id="pg-profile" class="page">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <h2 id="u-n">...</h2>
                <div id="u-c-top" style="color:var(--red); font-weight:bold"></div>
            </div>
            <div id="p-list"></div>
        </div>

        <div id="pg-info" class="page hidden">
            <h3>📍 СКЛАД</h3><div class="card" id="view-adr"></div>
            <h3>💳 ОПЛАТА</h3><div class="card" id="view-rek"></div>
        </div>

        <div id="pg-admin" class="page hidden">
            <h3>📦 НОВЫЙ ГРУЗ</h3>
            <div class="card">
                <input type="text" id="a-c" placeholder="Код клиента">
                <input type="number" id="a-w" step="0.1" placeholder="Общий вес (кг)">
                <input type="number" id="a-cnt" placeholder="Количество посылок" value="1">
                <select id="a-s"><option value="🚚 В ПУТИ">🚚 В ПУТИ</option><option value="🏁 ГОТОВ">🏁 ГОТОВ</option></select>
                <button class="btn" onclick="addP()">ДОБАВИТЬ ГРУЗ</button>
            </div>

            <h3>💬 ЛИЧНОЕ СООБЩЕНИЕ</h3>
            <div class="card">
                <input type="text" id="p-msg-code" placeholder="Код клиента (A105)">
                <input type="text" id="p-msg-text" placeholder="Текст сообщения">
                <button class="btn" style="background:orange" onclick="send({a:'p_msg', code:v('p-msg-code'), msg:v('p-msg-text')})">ОТПРАВИТЬ КЛИЕНТУ</button>
            </div>

            <h3>👥 ПОДТВЕРЖДЕНИЕ ЮЗЕРОВ</h3>
            <div id="user-list"></div>
        </div>
    </div>

    <div id="navbar" class="nav hidden">
        <div class="nav-item active" onclick="show('profile', this)">ГРУЗЫ</div>
        <div class="nav-item" onclick="show('info', this)">ИНФО</div>
        <div id="nav-adm" class="nav-item hidden" onclick="show('admin', this)">АДМИН</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const url = new URLSearchParams(window.location.search);
        const v = (id) => document.getElementById(id).value;
        const n = url.get('n'), r = url.get('r'), app = url.get('app'), p_msg = url.get('p_msg');

        if (!n || n === 'None') {
            document.getElementById('scr-auth').classList.remove('hidden');
        } else if (app === '0' && r !== 'Admin') {
            document.getElementById('scr-wait').classList.remove('hidden');
        } else {
            document.getElementById('scr-main').classList.remove('hidden');
            document.getElementById('navbar').classList.remove('hidden');
            document.getElementById('u-n').innerText = n;
            document.getElementById('u-c-top').innerText = url.get('c');
            document.getElementById('view-adr').innerText = url.get('adr');
            document.getElementById('view-rek').innerText = url.get('rek');
            
            if(p_msg && p_msg !== 'None' && p_msg !== '') {
                const box = document.getElementById('p-msg-box');
                box.innerText = "📩 СООБЩЕНИЕ ОТ АДМИНА: " + p_msg;
                box.classList.remove('hidden');
            }

            if (r === 'Admin') {
                document.getElementById('nav-adm').classList.remove('hidden');
                const ul = url.get('u_list');
                if(ul) {
                    ul.split(';').forEach(user => {
                        const [name, code, approved, tid] = user.split('|');
                        if(approved === '0') {
                            document.getElementById('user-list').innerHTML += `
                            <div class="card" style="font-size:12px">
                                👤 ${name} (${code})
                                <button class="btn" style="padding:5px; background:green" onclick="send({a:'app_user', tid:${tid}})">ПОДТВЕРДИТЬ</button>
                            </div>`;
                        }
                    });
                }
            }

            const parcels = url.get('p');
            if(parcels) {
                parcels.split(';').forEach(p => {
                    const [w, s, d, c_code, id, cnt] = p.split('|');
                    if(r === 'Admin' || c_code === url.get('c')) {
                        const isReady = s.includes('ГОТОВ');
                        document.getElementById('p-list').innerHTML += `
                            <div class="card">
                                <span class="status-badge ${isReady ? 'status-ready' : 'status-way'}">${s}</span>
                                <div style="display:flex; justify-content:space-between">
                                    <div>
                                        <div style="font-size:18px; font-weight:bold; color:white">${w} кг</div>
                                        <div style="font-size:12px; color:#37ff73">Кол-во: ${cnt} шт. | ${Math.round(w*570)}₽</div>
                                    </div>
                                    <div style="text-align:right">
                                        <small>${d}</small><br>
                                        ${r === 'Admin' ? `<small>${c_code}</small><br><b onclick="send({a:'del', id:${id}})" style="color:red">УДАЛИТЬ</b>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    }
                });
            }
        }

        function show(p, el) {
            document.querySelectorAll('.page').forEach(x => x.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById('pg-' + p).classList.remove('hidden');
            el.classList.add('active');
        }
        function send(data) { tg.sendData(JSON.stringify(data)); tg.close(); }
        function addP() { send({a:'add', c:v('a-c'), w:v('a-w'), cnt:v('a-cnt'), s:v('a-s')}); }
        tg.expand();
    </script>
</body>
</html>
